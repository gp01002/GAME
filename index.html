<head>

    <style>
        body { margin:0; overflow:hidden; background:#02050f; font-family:"Microsoft JhengHei",sans-serif; touch-action:none; }
        #game-container { position:absolute; top:0; left:0; width:100%; height:100%; }
        #overlay {
            position:absolute; bottom:0; left:0; width:100%;
            background:rgba(5,10,26,0.85); padding:5px 0;
            display:flex; flex-direction:column; align-items:center;
            backdrop-filter:blur(10px); z-index:100;
            border-top:1px solid rgba(0,242,255,0.2);
        }
        #selection-grid { display:grid; grid-template-columns:repeat(20,1fr); gap:2px; width:98%; max-width:1200px; }
        .character-card {
            background:rgba(255,255,255,0.03); border:1px solid #1a2a4a;
            cursor:pointer; padding:1px; position:relative; transition:transform 0.2s; text-align:center;
        }
        .character-card.active  { border-color:#00f2ff; background:rgba(0,242,255,0.2); transform:scale(1.1); }
        .character-card.online::after {
            content:""; position:absolute; top:2px; right:2px;
            width:6px; height:6px; background:#00ff00; border-radius:50%; box-shadow:0 0 5px #00ff00;
        }
        .character-icon { width:100%; aspect-ratio:1/1; background-size:cover; background-position:center; background-color:#111; }
        .character-name { font-size:7px; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transform:scale(0.85); }
        #joystick-zone { position:fixed; bottom:80px; left:30px; width:120px; height:120px; z-index:200; display:none; }
        #joystick-base { width:100%; height:100%; background:rgba(255,255,255,0.1); border-radius:50%; border:2px solid rgba(255,255,255,0.2); position:relative; }
        #joystick-knob { position:absolute; top:35px; left:35px; width:50px; height:50px; background:rgba(0,242,255,0.6); border-radius:50%; box-shadow:0 0 15px rgba(0,242,255,0.5); }
        #status-ui { position:fixed; top:15px; left:15px; color:#00f2ff; background:rgba(5,10,26,0.7); padding:5px 12px; font-size:11px; border-left:2px solid #00f2ff; pointer-events:none; z-index:150; line-height:1.8; }
        #score-ui { position:fixed; top:15px; right:15px; color:#ffee44; background:rgba(5,10,26,0.7); padding:5px 14px; font-size:14px; border-right:2px solid #ffee44; pointer-events:none; z-index:150; text-align:right; line-height:2; }
        #eat-flash { position:fixed; top:42%; left:50%; transform:translate(-50%,-50%); font-size:32px; font-weight:bold; color:#fff; pointer-events:none; z-index:300; opacity:0; transition:opacity 0.15s; text-shadow:0 0 20px #0ff; }
        @media (pointer:coarse) { #joystick-zone { display:block; } }
    </style>
</head>

// ╔══════════════════════════════════════════════════════════╗
// ║                    資源設定區                            ║
// ╠══════════════════════════════════════════════════════════╣

// ║  食物：food_0.glb ～ food_{FOOD_COUNT-1}.glb            ║

// ║  天空：任意 JPG 檔名填入 SKY_IMG                        ║
// ╚══════════════════════════════════════════════════════════╝
const CONFIG = {
    CHAR_SCALE:     3.5,    // 角色大小
    CHAR_IDLE_IDX:  0,      // 待機動畫 index
    CHAR_RUN_IDX:   1,      // 跑步動畫 index
    CHAR_MODEL_ROTATE: 0, // ★ 模型朝向修正（PI=背對鏡頭往前，0=面對鏡頭，PI/2=右，-PI/2=左）
    SEG_SCALE:      0.6,    // 蛇身球大小

    FOOD_COUNT:     4,      // food_0.glb ～ food_3.glb（改 1 則讀 food.glb）
    FOOD_USE_GLB:   true,   // true = 3D 食物模型；false = 發光球
    FOOD_GLB_SCALE: 1.8,    // 食物模型大小
    FOOD_MAX:       15,     // 場上最多食物數
    FOOD_EAT_DIST:  2.5,    // 吃到食物距離

    STEAL_DIST:     1.6,    // 碰撞奪取距離
    STEAL_AMOUNT:   3,      // 每次奪取節段數
    SEG_SPACING:    10,     // 蛇身間距
    MOVE_SPEED:     0.18,
    TURN_SPEED:     0.055,
    FIELD_SIZE:     38,     // 食物生成範圍
    SKY_IMG:        'sky.jpg', // 天空背景（空字串 = 預設星空）
};

// ── Firebase ─────────────────────────────────────────────────
const firebaseConfig = {

};
const APP_ID = 'snake-multi';

// ── 角色定義 ─────────────────────────────────────────────────
const students = [
    {name:"高安妤",color:0xff4444},{name:"饒允志",color:0x44ffff},
    {name:"朱采曼",color:0x4444ff},{name:"林宸慈",color:0x44ff44},
    {name:"駱采綺",color:0xffff44},{name:"莊芷媛",color:0xff44ff},
    {name:"蘇汶欣",color:0x8844ff},{name:"葉子菱",color:0xff8844},
    {name:"張羽涵",color:0xffffff},{name:"高子媛",color:0xffeeaa},
    {name:"金煜喬",color:0xaa8866},{name:"陳品霖",color:0x888888},
    {name:"許博勛",color:0xffaa00},{name:"陳湘妮",color:0xffeeee},
    {name:"劉奕汝",color:0xffcccc},{name:"蔡明樺",color:0xccccff},
    {name:"鍾凱羽",color:0xccffcc},{name:"學員18",color:0x445566},
    {name:"學員19",color:0x556677},{name:"學員20",color:0x667788}
];
const FOOD_COLORS=[0xff3333,0x33ff66,0xffff33,0xff33ff,0x33ffff,0xff8800,0xffffff,0x00aaff,0xff6699];

// ── Three.js ─────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.shadowMap.enabled = true;
document.getElementById('game-container').appendChild(renderer.domElement);

// ── 場景 ─────────────────────────────────────────────────────
function buildScene() {
    scene.background = new THREE.Color(0x02050f);
    scene.fog = new THREE.FogExp2(0x02050f, 0.012);

    // 星星
    const sp=[], sg=new THREE.BufferGeometry();
    for(let i=0;i<3000;i++) sp.push((Math.random()-.5)*400,Math.random()*80+5,(Math.random()-.5)*400);
    sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
    scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.18,transparent:true,opacity:0.7})));

    // 地板
    const grid=new THREE.GridHelper(500,100,0x1a3a6a,0x0a1a3a); grid.position.y=0.01; scene.add(grid);
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({color:0x050e22,metalness:0.3,roughness:0.8,transparent:true,opacity:0.9}));
    floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

    // 燈光
    scene.add(new THREE.AmbientLight(0xffffff,2.5));
    const sun=new THREE.DirectionalLight(0xffffff,3.0); sun.position.set(20,40,20); sun.castShadow=true; scene.add(sun);
    const rl1=new THREE.PointLight(0x88ddff,4,120); rl1.position.set(0,20,0); scene.add(rl1);
    const rl2=new THREE.PointLight(0xffccaa,2,80); rl2.position.set(-30,10,30); scene.add(rl2);
    const rl3=new THREE.PointLight(0xaaffcc,2,80); rl3.position.set(30,10,-30); scene.add(rl3);

    // 場地邊界光柱
    const pm=new THREE.MeshStandardMaterial({color:0x00f2ff,emissive:0x00f2ff,emissiveIntensity:0.8,transparent:true,opacity:0.4});
    [[-CONFIG.FIELD_SIZE,-1,CONFIG.FIELD_SIZE],[CONFIG.FIELD_SIZE,-1,CONFIG.FIELD_SIZE],
     [CONFIG.FIELD_SIZE,-1,-CONFIG.FIELD_SIZE],[-CONFIG.FIELD_SIZE,-1,-CONFIG.FIELD_SIZE]].forEach(([x,y,z])=>{
        const p=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,6,8),pm);
        p.position.set(x,y+3,z); scene.add(p);
        const pl=new THREE.PointLight(0x00f2ff,1.5,12); pl.position.set(x,y+6,z); scene.add(pl);
    });

    // 天空 JPG
    if (CONFIG.SKY_IMG) {
        new THREE.TextureLoader().load(CONFIG.SKY_IMG, tex=>{
            tex.mapping=THREE.EquirectangularReflectionMapping;
            scene.background=tex;
        });
    }
}
buildScene();

// ── 玩家狀態 ─────────────────────────────────────────────────
let userId=null, myIdx=0;
const myGroup=new THREE.Group();
scene.add(myGroup);
let myMixer=null, myActions={};
let mySegments=[], myPath=[], mySegCount=0;

// ── 上次上傳的位置（只有移動才寫入）─────────────────────────
let lastUploadPos = new THREE.Vector3(9999,0,9999);
let lastUploadRot = 0;
let lastUploadSeg = 0;
let lastUploadTime = 0;
const UPLOAD_MOVE_THRESHOLD = 0.3; // 移動超過這個距離才上傳
const UPLOAD_FORCE_INTERVAL = 5000; // 最多 5 秒強制上傳一次（保持在線狀態）

// ── 其他玩家 / 食物 ───────────────────────────────────────────
const otherPlayers={}, foodMeshes={}, stealCD={};
let db=null, foodColRef=null, playersColRef=null;

// ── 食物 GLB 快取 ─────────────────────────────────────────────
const foodGLBCache={};

// ── Loader / 輸入 ─────────────────────────────────────────────
const loader=new GLTFLoader(), keys={};
let joyActive=false, joyX=0, joyY=0;

// ── 工具 ─────────────────────────────────────────────────────
function safeSetRunning(actions,run) {
    if(!actions?.idle||!actions?.run) return;
    try {
        if(run&&!actions.run.isRunning()){actions.idle.fadeOut(0.2);actions.run.reset().fadeIn(0.2).play();}
        else if(!run&&actions.run.isRunning()){actions.run.fadeOut(0.2);actions.idle.reset().fadeIn(0.2).play();}
    }catch(e){}
}

async function loadModel(idx,grp) {
    grp.clear();
    return new Promise(resolve=>{
        loader.load(`student_${idx}.glb`, gltf=>{
            const model=gltf.scene;
            model.scale.setScalar(CONFIG.CHAR_SCALE);
            model.rotation.y = CONFIG.CHAR_MODEL_ROTATE; // ★ 模型朝向修正
            model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});
            grp.add(model);
            const mixer=new THREE.AnimationMixer(model), anims=gltf.animations, actions={};
            if(anims[CONFIG.CHAR_IDLE_IDX]){actions.idle=mixer.clipAction(anims[CONFIG.CHAR_IDLE_IDX]);actions.idle.play();}
            if(anims[CONFIG.CHAR_RUN_IDX]) actions.run=mixer.clipAction(anims[CONFIG.CHAR_RUN_IDX]);
            resolve({mixer,actions});
        }, undefined, ()=>{
            // Fallback 方塊（不隨 CHAR_SCALE 放大）
            const m=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.8,0.8),
                new THREE.MeshStandardMaterial({color:students[idx].color}));
            m.position.y=0.9; m.castShadow=true; grp.add(m);
            const gl=new THREE.PointLight(students[idx].color,0.5,4); gl.position.y=1.8; grp.add(gl);
            resolve({mixer:null,actions:{}});
        });
    });
}

function setSegCount(segArr,count,color) {
    while(segArr.length<count){
        const s=new THREE.Mesh(new THREE.SphereGeometry(CONFIG.SEG_SCALE,8,8),
            new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.4}));
        s.castShadow=true; scene.add(s); segArr.push(s);
    }
    while(segArr.length>count) scene.remove(segArr.pop());
}

let flashTimer=null;
function showFlash(msg){
    const el=document.getElementById('eat-flash');
    el.textContent=msg; el.style.opacity=1;
    clearTimeout(flashTimer); flashTimer=setTimeout(()=>el.style.opacity=0,750);
}
function updateScore(){ document.getElementById('score-ui').innerHTML=`🐍 長度：${mySegCount+1}`; }
function setStatus(a,b=''){document.getElementById('status-ui').innerHTML=a+(b?`<br>${b}`:'');}

// ── 食物 GLB 預載 ─────────────────────────────────────────────
async function preloadFoodGLBs() {
    if(!CONFIG.FOOD_USE_GLB) return;
    for(let i=0;i<CONFIG.FOOD_COUNT;i++){
        const url=CONFIG.FOOD_COUNT===1?'food.glb':`food_${i}.glb`;
        await new Promise(resolve=>{
            loader.load(url, gltf=>{
                foodGLBCache[i]=gltf.scene;
                console.log(`[Food] ✅ ${url}`);
                resolve();
            }, undefined, err=>{
                console.warn(`[Food] ❌ ${url}`,err?.message||'');
                resolve();
            });
        });
    }
    console.log(`[Food] 預載 ${Object.keys(foodGLBCache).length}/${CONFIG.FOOD_COUNT} 種`);
}

// ── 食物 Mesh ─────────────────────────────────────────────────
function buildFoodMesh(docId,x,z,t) {
    if(foodMeshes[docId]) return;
    const grp=new THREE.Group(); grp.position.set(x,0,z);
    if(CONFIG.FOOD_USE_GLB&&foodGLBCache[t??0]){
        const model=foodGLBCache[t??0].clone(true);
        model.scale.setScalar(CONFIG.FOOD_GLB_SCALE);
        model.traverse(n=>{if(n.isMesh) n.castShadow=true;});
        grp.add(model);
    } else {
        const color=FOOD_COLORS[(t??0)%FOOD_COLORS.length];
        const ball=new THREE.Mesh(new THREE.SphereGeometry(0.42,12,12),
            new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.85}));
        ball.castShadow=true; grp.add(ball);
        grp.add(Object.assign(new THREE.PointLight(color,3.0,8)));
    }
    scene.add(grp); foodMeshes[docId]=grp;
}

function eraseFoodMesh(docId){
    if(!foodMeshes[docId]) return;
    scene.remove(foodMeshes[docId]); delete foodMeshes[docId];
}

// ── 食物生成（★ 由第一個連線的玩家當主機負責生成）────────────
let isHost=false, lastHostCheck=0;
const HOST_DOC = `artifacts/${APP_ID}/public/data/meta`;

async function checkAndClaimHost() {
    if(!db) return;
    const now=Date.now();
    if(now-lastHostCheck<10000) return;
    lastHostCheck=now;
    try {
        const snap=await getDoc(doc(db,HOST_DOC));
        const data=snap.exists()?snap.data():{};
        const hostExpiry=data.hostExpiry??0;
        const hostId=data.hostId??'';

        if(hostId===userId){
            // 我是主機，續租
            isHost=true;
            await setDoc(doc(db,HOST_DOC),{hostId:userId,hostExpiry:now+15000},{merge:true});
        } else if(now>hostExpiry){
            // 主機過期，接管
            isHost=true;
            await setDoc(doc(db,HOST_DOC),{hostId:userId,hostExpiry:now+15000},{merge:true});
            console.log('[Host] 成為主機，負責生成食物');
        } else {
            isHost=false;
        }
    } catch(e){}
}

async function spawnFoodIfHost() {
    if(!isHost||!db||!foodColRef) return;
    try {
        const snap=await getDocs(foodColRef);
        if(snap.size>=CONFIG.FOOD_MAX) return;
        const need=Math.min(4,CONFIG.FOOD_MAX-snap.size);
        const writes=[];
        for(let i=0;i<need;i++){
            const x=(Math.random()*2-1)*CONFIG.FIELD_SIZE;
            const z=(Math.random()*2-1)*CONFIG.FIELD_SIZE;
            const t=Math.floor(Math.random()*CONFIG.FOOD_COUNT);
            writes.push(addDoc(foodColRef,{x,z,t,ts:Date.now()}));
        }
        if(writes.length) await Promise.all(writes);
    } catch(e){ console.warn('[Food spawn]',e.code); }
}

// ── ★ 智慧位置上傳（只在有變化時才寫入）──────────────────────
async function smartUpload() {
    if(!userId||!db) return;
    const now=Date.now();
    const pos=myGroup.position;
    const rot=myGroup.rotation.y;

    const moved = pos.distanceTo(lastUploadPos)>UPLOAD_MOVE_THRESHOLD;
    const rotated = Math.abs(rot-lastUploadRot)>0.05;
    const segChanged = mySegCount!==lastUploadSeg;
    const forceDue = (now-lastUploadTime)>UPLOAD_FORCE_INTERVAL;

    // 沒有任何變化且不到強制時間，跳過
    if(!moved&&!rotated&&!segChanged&&!forceDue) return;

    lastUploadPos.copy(pos);
    lastUploadRot=rot;
    lastUploadSeg=mySegCount;
    lastUploadTime=now;

    try {
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','players',userId),{
            x:pos.x, z:pos.z, rot, idx:myIdx,
            segCount:mySegCount,
            isMoving:keys.isMoving||joyActive,
            lastSeen:now
        },{merge:true});
    } catch(e){}
}

// ── 碰撞奪取 ─────────────────────────────────────────────────
async function trySteal(uid) {
    const now=Date.now();
    if(stealCD[uid]&&now-stealCD[uid]<2000) return;
    stealCD[uid]=now;
    const p=otherPlayers[uid];
    if(!p||p.segCount<=0||!db) return;
    const n=Math.min(CONFIG.STEAL_AMOUNT,p.segCount);
    mySegCount+=n;
    setSegCount(mySegments,mySegCount,students[myIdx].color);
    showFlash(`⚡ +${n}`); updateScore();
    try {
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','players',uid),
            {segCount:Math.max(0,p.segCount-n)},{merge:true});
    } catch(e){}
}

// ── 離線玩家清理（主機負責）───────────────────────────────────
async function cleanupStalePlayers() {
    if(!isHost||!db) return;
    try {
        const snap=await getDocs(collection(db,'artifacts',APP_ID,'public','data','players'));
        const now=Date.now();
        snap.forEach(async dSnap=>{
            const d=dSnap.data();
            if(d.lastSeen&&now-d.lastSeen>15000&&dSnap.id!==userId){
                await deleteDoc(dSnap.ref);
                console.log('[Cleanup] 移除離線玩家',dSnap.id.slice(0,6));
            }
        });
    } catch(e){}
}

// ── Firebase 啟動 ─────────────────────────────────────────────
async function initFirebase() {
    try {
        const app=initializeApp(firebaseConfig);
        const auth=getAuth(app);
        db=getFirestore(app);
        setStatus('🔄 正在連線...');
        await signInAnonymously(auth);

        onAuthStateChanged(auth, user=>{
            if(!user) return;
            userId=user.uid;
            setStatus('多人連線中 ✅','WASD / 搖桿 移動');

            foodColRef  = collection(db,'artifacts',APP_ID,'public','data','food');
            playersColRef = collection(db,'artifacts',APP_ID,'public','data','players');

            // ── 食物監聽（只讀，不寫）────────────────────────
            onSnapshot(foodColRef, snap=>{
                const live=new Set(snap.docs.map(d=>d.id));
                Object.keys(foodMeshes).forEach(id=>{if(!live.has(id)) eraseFoodMesh(id);});
                snap.forEach(d=>buildFoodMesh(d.id,d.data().x,d.data().z,d.data().t));
                setStatus('多人連線中 ✅',`WASD / 搖桿 移動　🍎 ${snap.size}`);
            });

            // ── 玩家監聽（只讀）──────────────────────────────
            onSnapshot(playersColRef, snap=>{
                const liveIds=new Set(snap.docs.map(d=>d.id));
                snap.forEach(async dSnap=>{
                    const data=dSnap.data(), uid=dSnap.id;
                    if(uid===userId){
                        // 被偷同步
                        if(typeof data.segCount==='number'&&data.segCount<mySegCount){
                            const lost=mySegCount-data.segCount;
                            mySegCount=data.segCount;
                            setSegCount(mySegments,mySegCount,students[myIdx].color);
                            showFlash(`💀 -${lost}`); updateScore();
                        }
                        return;
                    }
                    handleRemote(uid,data);
                });
                Object.keys(otherPlayers).forEach(uid=>{if(!liveIds.has(uid)) removeRemote(uid);});
                updateCardUI(snap.docs.map(d=>d.data().idx));
            });

            // ── 智慧上傳：每 200ms 檢查一次，但只在有變化時寫入 ──
            setInterval(smartUpload, 200);

            // ── 主機競選：每 8 秒 ────────────────────────────
            checkAndClaimHost();
            setInterval(checkAndClaimHost, 8000);

            // ── 食物生成：每 10 秒（只有主機執行）────────────
            setTimeout(()=>{checkAndClaimHost().then(spawnFoodIfHost);}, 1000);
            setInterval(spawnFoodIfHost, 10000);

            // ── 離線清理：每 20 秒（只有主機執行）────────────
            setInterval(cleanupStalePlayers, 20000);

            // ── 離開時刪除自己 ───────────────────────────────
            window.addEventListener('beforeunload', ()=>{
                if(userId&&db)
                    deleteDoc(doc(db,'artifacts',APP_ID,'public','data','players',userId)).catch(()=>{});
            });
        });
    } catch(err){ setStatus('⚠️ 連線失敗',err.message); }
}

async function handleRemote(uid,data) {
    if(!otherPlayers[uid]){
        const grp=new THREE.Group(); scene.add(grp);
        otherPlayers[uid]={grp,segments:[],path:[],idx:-1,segCount:0};
    }
    const p=otherPlayers[uid];
    p.targetPos=new THREE.Vector3(data.x,0,data.z);
    p.targetRot=data.rot; p.remoteMoving=data.isMoving; p.segCount=data.segCount??0;
    if(p.idx!==data.idx){
        p.idx=data.idx;
        const r=await loadModel(p.idx,p.grp); p.mixer=r.mixer; p.actions=r.actions;
    }
    setSegCount(p.segments,p.segCount,students[data.idx]?.color??0xffffff);
}

function removeRemote(uid){
    if(!otherPlayers[uid]) return;
    scene.remove(otherPlayers[uid].grp);
    otherPlayers[uid].segments.forEach(s=>scene.remove(s));
    delete otherPlayers[uid];
}

// ── 搖桿 ─────────────────────────────────────────────────────
const knob=document.getElementById('joystick-knob');
addEventListener('touchstart',e=>{const t=e.touches[0];if(t.clientX<200&&t.clientY>innerHeight-250) joyActive=true;});
addEventListener('touchmove',e=>{
    if(!joyActive) return;
    const t=e.touches[0],r=document.getElementById('joystick-base').getBoundingClientRect();
    joyX=(t.clientX-r.left-r.width/2)/60; joyY=(t.clientY-r.top-r.height/2)/60;
    const d=Math.hypot(joyX,joyY); if(d>1){joyX/=d;joyY/=d;}
    knob.style.transform=`translate(${joyX*35}px,${joyY*35}px)`;
});
addEventListener('touchend',()=>{joyActive=false;joyX=joyY=0;knob.style.transform='translate(0,0)';});

// ── 主迴圈 ───────────────────────────────────────────────────
const clock=new THREE.Clock();
let foodBob=0;

function animate(){
    requestAnimationFrame(animate);
    const dt=clock.getDelta();
    foodBob+=dt*2;

    let spd=0;
    if(keys['w']||keys['arrowup'])    spd= CONFIG.MOVE_SPEED;
    if(keys['s']||keys['arrowdown'])  spd=-CONFIG.MOVE_SPEED;
    if(keys['a']||keys['arrowleft'])  myGroup.rotation.y+=CONFIG.TURN_SPEED;
    if(keys['d']||keys['arrowright']) myGroup.rotation.y-=CONFIG.TURN_SPEED;
    if(joyActive){
        const d=Math.hypot(joyX,joyY);
        if(d>0.1){myGroup.rotation.y=Math.atan2(-joyX,-joyY);spd=CONFIG.MOVE_SPEED*d;}
    }

    const moving=spd!==0;
    if(moving) myGroup.translateZ(spd);
    keys.isMoving=moving;
    if(myMixer){myMixer.update(dt);safeSetRunning(myActions,moving);}

    myPath.unshift({pos:myGroup.position.clone()});
    if(myPath.length>500) myPath.pop();
    mySegments.forEach((s,i)=>{
        const step=(i+1)*CONFIG.SEG_SPACING;
        if(myPath[step]) s.position.lerp(myPath[step].pos,0.4);
    });

    // 食物動畫 + 吃食物
    const hp=myGroup.position;
    Object.entries(foodMeshes).forEach(([id,grp])=>{
        grp.position.y=0.5+Math.sin(foodBob+id.charCodeAt(0)*0.5)*0.22;
        grp.rotation.y+=dt*1.2;
        if(hp.distanceTo(grp.position)<CONFIG.FOOD_EAT_DIST){
            eraseFoodMesh(id);
            mySegCount++;
            setSegCount(mySegments,mySegCount,students[myIdx].color);
            updateScore(); showFlash('🍎 +1');
            if(db) deleteDoc(doc(db,'artifacts',APP_ID,'public','data','food',id)).catch(()=>{});
        }
    });

    // 碰撞
    for(const [uid,p] of Object.entries(otherPlayers)){
        for(const seg of p.segments){
            if(hp.distanceTo(seg.position)<CONFIG.STEAL_DIST){trySteal(uid);break;}
        }
    }

    // 遠端更新
    for(const [,p] of Object.entries(otherPlayers)){
        if(p.targetPos) p.grp.position.lerp(p.targetPos,0.15);
        if(p.targetRot!==undefined) p.grp.rotation.y=THREE.MathUtils.lerp(p.grp.rotation.y,p.targetRot,0.15);
        if(p.mixer){p.mixer.update(dt);safeSetRunning(p.actions,p.remoteMoving);}
        p.path.unshift({pos:p.grp.position.clone()});
        if(p.path.length>500) p.path.pop();
        p.segments.forEach((s,i)=>{const st=(i+1)*CONFIG.SEG_SPACING;if(p.path[st]) s.position.lerp(p.path[st].pos,0.4);});
    }

    const ic=new THREE.Vector3(0,7,-16).applyMatrix4(myGroup.matrixWorld);
    camera.position.lerp(ic,0.1);
    camera.lookAt(myGroup.position.x,1.5,myGroup.position.z);
    renderer.render(scene,camera);
}

// ── UI ───────────────────────────────────────────────────────
function initUI(){
    const grid=document.getElementById('selection-grid');
    students.forEach((s,i)=>{
        const card=document.createElement('div');
        card.className='character-card'; card.id=`card-${i}`;
        const hex=new THREE.Color(s.color).getHexString();
        card.innerHTML=`<div class="character-icon" style="background-color:#${hex};background-image:url('icon_${i}.jpg')"></div><div class="character-name">${s.name}</div>`;
        card.onclick=()=>switchChar(i);
        grid.appendChild(card);
    });
}
function updateCardUI(idxs){
    document.querySelectorAll('.character-card').forEach((c,i)=>{
        c.classList.toggle('online',idxs.includes(i)&&i!==myIdx);
        c.classList.toggle('active',i===myIdx);
    });
}
async function switchChar(idx){
    myIdx=idx;
    document.querySelectorAll('.character-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
    setSegCount(mySegments,mySegCount,students[idx].color);
    const r=await loadModel(idx,myGroup); myMixer=r.mixer; myActions=r.actions;
}

addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; });
addEventListener('keyup',  e=>{ keys[e.key.toLowerCase()]=false; });
addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// ── 啟動 ─────────────────────────────────────────────────────
initUI();
switchChar(0);
await preloadFoodGLBs();
initFirebase();
animate();
</script>

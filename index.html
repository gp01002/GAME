        #joystick-zone{position:fixed;bottom:80px;left:20px;width:110px;height:110px;z-index:200;display:none;}
        #joystick-base{width:100%;height:100%;background:rgba(255,255,255,0.08);border-radius:50%;border:2px solid rgba(255,255,255,0.2);position:relative;}

        /* ── 發射鈕（手機右下）── */
        #shoot-btn{
            position:fixed;bottom:90px;right:20px;
            width:70px;height:70px;border-radius:50%;
            background:rgba(255,80,80,0.8);border:3px solid #ff4444;
            color:#fff;font-size:22px;font-weight:bold;

        #shoot-btn:active{transform:scale(0.92);background:rgba(255,120,120,0.9);}

        /* ── 狀態 / 分數 ── */
        #status-ui{position:fixed;top:15px;left:15px;color:#00f2ff;background:rgba(5,10,26,0.7);padding:5px 12px;font-size:11px;border-left:2px solid #00f2ff;pointer-events:none;z-index:150;line-height:1.8;}

            #joystick-zone{display:block;}

function buildScene() {
    scene.background = new THREE.Color(0x02050f);
    scene.fog = new THREE.FogExp2(0x02050f, 0.012);
    const sp=[],sg=new THREE.BufferGeometry();

    const grid=new THREE.GridHelper(500,100,0x1a3a6a,0x0a1a3a); grid.position.y=0.01; scene.add(grid);
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({color:0x050e22,metalness:0.3,roughness:0.8,transparent:true,opacity:0.9}));
    floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
    scene.add(new THREE.AmbientLight(0xffffff,2.5));
    const sun=new THREE.DirectionalLight(0xffffff,3.0); sun.position.set(20,40,20); sun.castShadow=true; scene.add(sun);
    scene.add(Object.assign(new THREE.PointLight(0x88ddff,4,120),{position:{x:0,y:20,z:0}}));
    scene.add(Object.assign(new THREE.PointLight(0xffccaa,2,80),{position:{x:-30,y:10,z:30}}));
    scene.add(Object.assign(new THREE.PointLight(0xaaffcc,2,80),{position:{x:30,y:10,z:-30}}));
    const pm=new THREE.MeshStandardMaterial({color:0x00f2ff,emissive:0x00f2ff,emissiveIntensity:0.8,transparent:true,opacity:0.4});
    [[-CONFIG.FIELD_SIZE,CONFIG.FIELD_SIZE],[CONFIG.FIELD_SIZE,CONFIG.FIELD_SIZE],[CONFIG.FIELD_SIZE,-CONFIG.FIELD_SIZE],[-CONFIG.FIELD_SIZE,-CONFIG.FIELD_SIZE]].forEach(([x,z])=>{
        const p=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,6,8),pm); p.position.set(x,2,z); scene.add(p);
        const pl=new THREE.PointLight(0x00f2ff,1.5,12); pl.position.set(x,6,z); scene.add(pl);
    });
    if(CONFIG.SKY_IMG) new THREE.TextureLoader().load(CONFIG.SKY_IMG,tex=>{tex.mapping=THREE.EquirectangularReflectionMapping;scene.background=tex;});
}

// ── 工具 ─────────────────────────────────
function safeSetRunning(actions,run){
    if(!actions?.idle||!actions?.run) return;
    try{
        if(run&&!actions.run.isRunning()){actions.idle.fadeOut(0.2);actions.run.reset().fadeIn(0.2).play();}
        else if(!run&&actions.run.isRunning()){actions.run.fadeOut(0.2);actions.idle.reset().fadeIn(0.2).play();}
    }catch(e){}
}

async function loadModel(idx,grp){
    grp.clear();
    return new Promise(resolve=>{
        loader.load(`student_${idx}.glb`,gltf=>{
            const model=gltf.scene;
            model.scale.setScalar(CONFIG.CHAR_SCALE);
            model.rotation.y=CONFIG.CHAR_MODEL_ROTATE;
            model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});
            grp.add(model);
            const mixer=new THREE.AnimationMixer(model),anims=gltf.animations,actions={};
            if(anims[CONFIG.CHAR_IDLE_IDX]){actions.idle=mixer.clipAction(anims[CONFIG.CHAR_IDLE_IDX]);actions.idle.play();}
            if(anims[CONFIG.CHAR_RUN_IDX]) actions.run=mixer.clipAction(anims[CONFIG.CHAR_RUN_IDX]);
            resolve({mixer,actions});
        },undefined,()=>{
            const m=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.8,0.8),new THREE.MeshStandardMaterial({color:students[idx].color}));
            m.position.y=0.9; m.castShadow=true; grp.add(m);
            const gl=new THREE.PointLight(students[idx].color,0.5,4); gl.position.y=1.8; grp.add(gl);
            resolve({mixer:null,actions:{}});
        });
    });
}

// ── 食物 GLB 預載 ─────────────────────────
async function preloadFoodGLBs(){
    if(!CONFIG.FOOD_USE_GLB) return;
    for(let i=0;i<CONFIG.FOOD_COUNT;i++){
        const url=CONFIG.FOOD_COUNT===1?'food.glb':`food_${i}.glb`;
        await new Promise(resolve=>{
            loader.load(url,gltf=>{foodGLBCache[i]=gltf.scene;console.log(`[Food] ✅ ${url}`);resolve();},
                undefined,err=>{console.warn(`[Food] ❌ ${url}`);resolve();});
        });
    }
}

// ── 建立食物 Mesh（回傳 Group）────────────
function makeFoodGroup(typeIdx){
    const grp=new THREE.Group();
    const t=typeIdx??0;
    if(CONFIG.FOOD_USE_GLB&&foodGLBCache[t%CONFIG.FOOD_COUNT]){
        const model=foodGLBCache[t%CONFIG.FOOD_COUNT].clone(true);
        model.scale.setScalar(CONFIG.FOOD_GLB_SCALE);
        model.traverse(n=>{if(n.isMesh) n.castShadow=true;});
        grp.add(model);
    } else {
        const color=FOOD_COLORS[t%FOOD_COLORS.length];
        const ball=new THREE.Mesh(new THREE.SphereGeometry(0.42,12,12),new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.85}));
        ball.castShadow=true; grp.add(ball);
        const light=new THREE.PointLight(color,3.0,8); grp.add(light);
    }
    return grp;
}

function buildFoodMesh(docId,x,z,t){
    if(foodMeshMap[docId]) return;

function eraseFoodMesh(docId){

// ── 尾巴管理（使用真實食物模型）────────────
function addTailSegment(foodType){
    const grp=makeFoodGroup(foodType);
    // 初始放在角色位置
    grp.position.copy(myGroup.position);
    scene.add(grp);
    myTail.push({mesh:grp, foodType});
}
function removeTailSegment(){
    if(myTail.length===0) return null;
    const seg=myTail.pop();
    scene.remove(seg.mesh);
    return seg.foodType;
}
function syncTailCount(count, defaultType=0){
    while(myTail.length<count) addTailSegment(defaultType);
    while(myTail.length>count) removeTailSegment();
}

// ── 粒子特效（命中爆炸）─────────────────
function spawnHitParticles(pos, color=0xff4400){
    const count=18;
    const geo=new THREE.BufferGeometry();
    const positions=new Float32Array(count*3);
    const velocities=[];
    for(let i=0;i<count;i++){
        positions[i*3]=pos.x; positions[i*3+1]=pos.y+1; positions[i*3+2]=pos.z;
        velocities.push(new THREE.Vector3((Math.random()-.5)*0.3,(Math.random()*0.2+0.05),(Math.random()-.5)*0.3));
    }
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    const pts=new THREE.Points(geo,new THREE.PointsMaterial({color,size:0.25,transparent:true,opacity:1}));
    scene.add(pts);
    let life=1.0;
    const tick=()=>{
        life-=0.04;
        if(life<=0){scene.remove(pts);return;}
        const pos=geo.attributes.position.array;
        for(let i=0;i<count;i++){
            pos[i*3]  +=velocities[i].x;
            pos[i*3+1]+=velocities[i].y; velocities[i].y-=0.008;
            pos[i*3+2]+=velocities[i].z;
        }
        pts.material.opacity=life;
        geo.attributes.position.needsUpdate=true;
        requestAnimationFrame(tick);
    };
    tick();
}

// ── 子彈發射特效（拖尾光點）─────────────
function makeBulletTrail(color){
    const light=new THREE.PointLight(color,3,6);
    const core=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:1}));
    const grp=new THREE.Group(); grp.add(light); grp.add(core);
    return grp;
}

// ── 發射 ─────────────────────────────────
function shoot(){
    const now=Date.now();
    if(now-lastShootTime<CONFIG.SHOOT_COOLDOWN) return;
    if(myTail.length===0){showFlash('❌ 沒有食物可發射！');return;}
    lastShootTime=now;

    // 取出尾巴最後一個食物
    const seg=myTail.pop();
    scene.remove(seg.mesh);

    // 建立子彈（用食物模型縮小）
    const bulletGrp=makeFoodGroup(seg.foodType);
    bulletGrp.scale.setScalar(0.55);
    bulletGrp.position.copy(myGroup.position);
    bulletGrp.position.y=1;

    // 加發光拖尾
    const trailColor=students[myIdx].color;
    const trailLight=new THREE.PointLight(trailColor,4,8);
    bulletGrp.add(trailLight);

    scene.add(bulletGrp);

    // 方向：角色面向
    const dir=new THREE.Vector3(0,0,1).applyQuaternion(myGroup.quaternion);

    bullets.push({mesh:bulletGrp, dir, life:CONFIG.BULLET_LIFETIME, ownerId:userId, foodType:seg.foodType});
    showFlash('🚀');
}

// ── 主機 / 食物生成 ───────────────────────
let isHost=false, lastHostCheck=0;
const HOST_DOC=`artifacts/${APP_ID}/public/data/meta`;
async function checkAndClaimHost(){
    if(!db) return;
    const now=Date.now();
    if(now-lastHostCheck<10000) return;
    lastHostCheck=now;
    try{
        const snap=await getDoc(doc(db,HOST_DOC));
        const data=snap.exists()?snap.data():{};
        if(data.hostId===userId||now>( data.hostExpiry??0)){
            isHost=true;
            await setDoc(doc(db,HOST_DOC),{hostId:userId,hostExpiry:now+15000},{merge:true});
        } else { isHost=false; }
    }catch(e){}
}
async function spawnFoodIfHost(){
    if(!isHost||!db||!foodColRef) return;
    try{
        const snap=await getDocs(foodColRef);
        if(snap.size>=CONFIG.FOOD_MAX) return;
        const need=Math.min(4,CONFIG.FOOD_MAX-snap.size);
        const writes=[];
        for(let i=0;i<need;i++){
            const x=(Math.random()*2-1)*CONFIG.FIELD_SIZE;
            const z=(Math.random()*2-1)*CONFIG.FIELD_SIZE;
            const t=Math.floor(Math.random()*CONFIG.FOOD_COUNT);
            writes.push(addDoc(foodColRef,{x,z,t,ts:Date.now()}));
        }
        if(writes.length) await Promise.all(writes);
    }catch(e){}
}
async function cleanupStalePlayers(){
    if(!isHost||!db) return;
    try{
        const snap=await getDocs(collection(db,'artifacts',APP_ID,'public','data','players'));
        const now=Date.now();
        snap.forEach(async dSnap=>{
            if(dSnap.data().lastSeen&&now-dSnap.data().lastSeen>15000&&dSnap.id!==userId)
                await deleteDoc(dSnap.ref);
        });
    }catch(e){}
}

// ── 智慧上傳 ─────────────────────────────
async function smartUpload(){
    if(!userId||!db) return;
    const now=Date.now();
    const pos=myGroup.position, rot=myGroup.rotation.y;
    const moved=pos.distanceTo(lastUploadPos)>UPLOAD_THRESHOLD;
    const changed=Math.abs(rot-lastUploadRot)>0.05||myTail.length!==lastUploadSeg;
    const force=(now-lastUploadTime)>UPLOAD_FORCE;
    if(!moved&&!changed&&!force) return;
    lastUploadPos.copy(pos); lastUploadRot=rot; lastUploadSeg=myTail.length; lastUploadTime=now;
    try{
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','players',userId),{
            x:pos.x,z:pos.z,rot,idx:myIdx,
            segCount:myTail.length,
            isMoving:keys.isMoving||joyActive,
            lastSeen:now
        },{merge:true});
    }catch(e){}
}

async function trySteal(uid){
    const now=Date.now();
    if(stealCD[uid]&&now-stealCD[uid]<2000) return;
    stealCD[uid]=now;
    const p=otherPlayers[uid];
    if(!p||p.segCount<=0||!db) return;
    const n=Math.min(CONFIG.STEAL_AMOUNT,p.segCount);
    for(let i=0;i<n;i++) addTailSegment(Math.floor(Math.random()*CONFIG.FOOD_COUNT));
    updateScore(); showFlash(`⚡ +${n}`);
    try{
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','players',uid),
            {segCount:Math.max(0,p.segCount-n)},{merge:true});
    }catch(e){}
}

// ── Firebase ──────────────────────────────
async function initFirebase(){
    try{
        const app=initializeApp(firebaseConfig);
        const auth=getAuth(app);
        db=getFirestore(app);
        setStatus('🔄 正在連線...');
        await signInAnonymously(auth);
        onAuthStateChanged(auth,user=>{
            if(!user) return;
            userId=user.uid;
            setStatus('多人連線中 ✅','WASD / 搖桿 移動');
            foodColRef=collection(db,'artifacts',APP_ID,'public','data','food');
            playersColRef=collection(db,'artifacts',APP_ID,'public','data','players');

            onSnapshot(foodColRef,snap=>{
                const live=new Set(snap.docs.map(d=>d.id));
                Object.keys(foodMeshMap).forEach(id=>{if(!live.has(id)) eraseFoodMesh(id);});
                snap.forEach(d=>buildFoodMesh(d.id,d.data().x,d.data().z,d.data().t));
                setStatus('多人連線中 ✅',`WASD / 搖桿 移動　🍎 ${snap.size}`);
            });

            onSnapshot(playersColRef,snap=>{
                const liveIds=new Set(snap.docs.map(d=>d.id));
                snap.forEach(async dSnap=>{
                    const data=dSnap.data(),uid=dSnap.id;
                    if(uid===userId){
                        // 被子彈/偷同步
                        if(typeof data.segCount==='number'&&data.segCount<myTail.length){
                            const lost=myTail.length-data.segCount;
                            for(let i=0;i<lost;i++) removeTailSegment();
                            showFlash(`💀 -${lost}`); updateScore();
                        }
                        return;
                    }
                    handleRemote(uid,data);
                });
                Object.keys(otherPlayers).forEach(uid=>{if(!liveIds.has(uid)) removeRemote(uid);});
                updateCardUI(snap.docs.map(d=>d.data().idx));
            });

            setInterval(smartUpload,200);
            checkAndClaimHost(); setInterval(checkAndClaimHost,8000);
            setTimeout(()=>{checkAndClaimHost().then(spawnFoodIfHost);},1000);
            setInterval(spawnFoodIfHost,10000);
            setInterval(cleanupStalePlayers,20000);

            window.addEventListener('beforeunload',()=>{
                if(userId&&db) deleteDoc(doc(db,'artifacts',APP_ID,'public','data','players',userId)).catch(()=>{});
            });
        });
    }catch(err){setStatus('⚠️ 連線失敗',err.message);}
}

async function handleRemote(uid,data){
    if(!otherPlayers[uid]){
        const grp=new THREE.Group(); scene.add(grp);
        otherPlayers[uid]={grp,segments:[],path:[],idx:-1,segCount:0};
    }
    const p=otherPlayers[uid];
    p.targetPos=new THREE.Vector3(data.x,0,data.z);
    p.targetRot=data.rot; p.remoteMoving=data.isMoving; p.segCount=data.segCount??0;
    if(p.idx!==data.idx){
        p.idx=data.idx;
        const r=await loadModel(p.idx,p.grp); p.mixer=r.mixer; p.actions=r.actions;
    }
    // 遠端尾巴用球代替（節省 GLB 克隆效能）
    while(p.segments.length<p.segCount){
        const c=students[data.idx]?.color??0xffffff;
        const s=new THREE.Mesh(new THREE.SphereGeometry(CONFIG.SEG_SCALE,8,8),
            new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.4}));
        scene.add(s); p.segments.push(s);
    }
    while(p.segments.length>p.segCount) scene.remove(p.segments.pop());
}

function removeRemote(uid){
    if(!otherPlayers[uid]) return;
    scene.remove(otherPlayers[uid].grp);
    otherPlayers[uid].segments.forEach(s=>scene.remove(s));
    delete otherPlayers[uid];
}

// ── 輸入：鍵盤 ───────────────────────────
addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.code==='Space'){e.preventDefault();shoot();}
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// ── 輸入：滑鼠拖曳旋轉視角 ───────────────
const canvas=renderer.domElement;
canvas.addEventListener('mousedown',e=>{
    if(e.button===0){dragActive=true;dragLastX=e.clientX;dragLastY=e.clientY;}
});
canvas.addEventListener('mousemove',e=>{
    if(!dragActive) return;
    camAngle -=(e.clientX-dragLastX)*0.005;
    camPitch  = Math.max(0.1,Math.min(1.2,camPitch+(e.clientY-dragLastY)*0.003));
    dragLastX=e.clientX; dragLastY=e.clientY;
});
canvas.addEventListener('mouseup',()=>dragActive=false);
canvas.addEventListener('mouseleave',()=>dragActive=false);

// ── 輸入：觸控（搖桿 + 視角旋轉分開）────
const joyBase=document.getElementById('joystick-base');
const joyZoneRect=()=>document.getElementById('joystick-zone').getBoundingClientRect();
const knob=document.getElementById('joystick-knob');

canvas.addEventListener('touchstart',e=>{
    Array.from(e.changedTouches).forEach(t=>{
        const jRect=joyZoneRect();
        const inJoy=t.clientX>=jRect.left&&t.clientX<=jRect.right&&t.clientY>=jRect.top&&t.clientY<=jRect.bottom;
        if(inJoy){
            // 搖桿
            if(touchIds.joy===-1){ touchIds.joy=t.identifier; joyActive=true; }
        } else {
            // 視角旋轉
            if(touchIds.cam===-1){ touchIds.cam=t.identifier; dragActive=true; dragLastX=t.clientX; dragLastY=t.clientY; }
        }
    });
},{passive:true});

canvas.addEventListener('touchmove',e=>{
    Array.from(e.changedTouches).forEach(t=>{
        if(t.identifier===touchIds.joy){
            const r=joyBase.getBoundingClientRect();
            joyX=(t.clientX-r.left-r.width/2)/55; joyY=(t.clientY-r.top-r.height/2)/55;
            const d=Math.hypot(joyX,joyY); if(d>1){joyX/=d;joyY/=d;}
            knob.style.transform=`translate(${joyX*32}px,${joyY*32}px)`;
        }
        if(t.identifier===touchIds.cam&&dragActive){
            camAngle -=(t.clientX-dragLastX)*0.006;
            camPitch  = Math.max(0.1,Math.min(1.2,camPitch+(t.clientY-dragLastY)*0.004));
            dragLastX=t.clientX; dragLastY=t.clientY;
        }
    });
},{passive:true});

canvas.addEventListener('touchend',e=>{
    Array.from(e.changedTouches).forEach(t=>{
        if(t.identifier===touchIds.joy){ touchIds.joy=-1; joyActive=false; joyX=joyY=0; knob.style.transform='translate(0,0)'; }
        if(t.identifier===touchIds.cam){ touchIds.cam=-1; dragActive=false; }
    });
},{passive:true});

// 搖桿區觸控（讓搖桿優先）
document.getElementById('joystick-zone').addEventListener('touchstart',e=>{
    const t=e.touches[0];
    if(touchIds.joy===-1){ touchIds.joy=t.identifier; joyActive=true; }
},{passive:true});

// 發射鈕
document.getElementById('shoot-btn').addEventListener('touchstart',e=>{e.preventDefault();shoot();},{passive:false});
document.getElementById('shoot-btn').addEventListener('click',shoot);

// ── 主迴圈 ───────────────────────────────
const clock=new THREE.Clock();
let foodBob=0;

function animate(){
    requestAnimationFrame(animate);
    const dt=clock.getDelta();
    foodBob+=dt*2;

    // 移動
    let spd=0;
    if(keys['w']||keys['arrowup'])    spd= CONFIG.MOVE_SPEED;
    if(keys['s']||keys['arrowdown'])  spd=-CONFIG.MOVE_SPEED;
    if(keys['a']||keys['arrowleft'])  myGroup.rotation.y+=CONFIG.TURN_SPEED;
    if(keys['d']||keys['arrowright']) myGroup.rotation.y-=CONFIG.TURN_SPEED;
    if(joyActive){
        const d=Math.hypot(joyX,joyY);
        if(d>0.1){
            // 搖桿方向疊加攝影機角度
            const angle=Math.atan2(joyX,joyY)+camAngle;
            myGroup.rotation.y=angle+Math.PI;
            spd=CONFIG.MOVE_SPEED*d;
        }
    }
    const moving=spd!==0;
    if(moving) myGroup.translateZ(spd);
    keys.isMoving=moving;
    if(myMixer){myMixer.update(dt);safeSetRunning(myActions,moving);}

    // 路徑記錄
    myPath.unshift({pos:myGroup.position.clone()});
    if(myPath.length>500) myPath.pop();

    // 尾巴跟隨（使用食物 GLB mesh）
    myTail.forEach((seg,i)=>{
        const step=(i+1)*CONFIG.SEG_SPACING;
        if(myPath[step]){
            seg.mesh.position.lerp(myPath[step].pos,0.4);
            seg.mesh.position.y=0.5+Math.sin(foodBob+i*0.8)*0.12;
            seg.mesh.rotation.y+=dt*0.8;
        }
    });

    // 場上食物動畫 + 吃食物
    const hp=myGroup.position;
    Object.entries(foodMeshMap).forEach(([id,grp])=>{
        grp.position.y=0.5+Math.sin(foodBob+id.charCodeAt(0)*0.5)*0.22;
        grp.rotation.y+=dt*1.2;
        if(hp.distanceTo(grp.position)<CONFIG.FOOD_EAT_DIST){
            const t=grp.userData.foodType??0;
            eraseFoodMesh(id);
            addTailSegment(t);
            updateScore(); showFlash('🍎 +1');
            // 吃到特效
            spawnHitParticles(grp.position.clone(), FOOD_COLORS[t%FOOD_COLORS.length]);
            if(db) deleteDoc(doc(db,'artifacts',APP_ID,'public','data','food',id)).catch(()=>{});
        }
    });

    // 子彈更新
    for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        b.life-=dt;
        b.mesh.position.addScaledVector(b.dir, CONFIG.BULLET_SPEED);
        b.mesh.rotation.y+=dt*4;

        // 命中判定
        let hit=false;
        for(const [uid,p] of Object.entries(otherPlayers)){
            if(b.mesh.position.distanceTo(p.grp.position)<CONFIG.BULLET_HIT_DIST){
                // 命中！
                spawnHitParticles(b.mesh.position.clone(),0xff4400);
                scene.remove(b.mesh);
                bullets.splice(i,1);
                hit=true;
                // 對方減少節段
                if(db) setDoc(doc(db,'artifacts',APP_ID,'public','data','players',uid),
                    {segCount:Math.max(0,(p.segCount??1)-2)},{merge:true}).catch(()=>{});
                showFlash('💥 命中！');
                break;
            }
        }
        if(!hit&&b.life<=0){
            scene.remove(b.mesh);
            bullets.splice(i,1);
        }
    }

    // 碰撞奪取
    for(const [uid,p] of Object.entries(otherPlayers)){
        for(const seg of p.segments){
            if(hp.distanceTo(seg.position)<CONFIG.STEAL_DIST){trySteal(uid);break;}
        }
    }

    // 遠端玩家
    for(const [,p] of Object.entries(otherPlayers)){
        if(p.targetPos) p.grp.position.lerp(p.targetPos,0.15);
        if(p.targetRot!==undefined) p.grp.rotation.y=THREE.MathUtils.lerp(p.grp.rotation.y,p.targetRot,0.15);
        if(p.mixer){p.mixer.update(dt);safeSetRunning(p.actions,p.remoteMoving);}
        p.path=p.path||[];
        p.path.unshift({pos:p.grp.position.clone()});
        if(p.path.length>500) p.path.pop();
        p.segments.forEach((s,i)=>{
            const st=(i+1)*CONFIG.SEG_SPACING;
            if(p.path[st]) s.position.lerp(p.path[st].pos,0.4);
        });
    }

    // ── 攝影機（支援旋轉）────────────────
    const tx=myGroup.position.x+Math.sin(camAngle)*CAM_DIST*Math.cos(camPitch);
    const ty=myGroup.position.y+Math.sin(camPitch)*CAM_DIST+CAM_H*0.3;
    const tz=myGroup.position.z+Math.cos(camAngle)*CAM_DIST*Math.cos(camPitch);
    camera.position.lerp(new THREE.Vector3(tx,ty,tz),0.1);
    camera.lookAt(myGroup.position.x,1.5,myGroup.position.z);

    renderer.render(scene,camera);
}

// ── UI ───────────────────────────────────
function initUI(){
    const grid=document.getElementById('selection-grid');
    students.forEach((s,i)=>{
        const card=document.createElement('div');
        card.className='character-card'; card.id=`card-${i}`;
        const hex=new THREE.Color(s.color).getHexString();
        card.innerHTML=`<div class="character-icon" style="background-color:#${hex};background-image:url('icon_${i}.jpg')"></div><div class="character-name">${s.name}</div>`;
        card.onclick=()=>switchChar(i);
        grid.appendChild(card);
    });
}
function updateCardUI(idxs){
    document.querySelectorAll('.character-card').forEach((c,i)=>{
        c.classList.toggle('online',idxs.includes(i)&&i!==myIdx);
        c.classList.toggle('active',i===myIdx);
    });
}
async function switchChar(idx){
    myIdx=idx;
    document.querySelectorAll('.character-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
    const r=await loadModel(idx,myGroup); myMixer=r.mixer; myActions=r.actions;
}

addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

// ── 啟動 ─────────────────────────────────
initUI();
switchChar(0);
await preloadFoodGLBs();
initFirebase();
animate();
</script>

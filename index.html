<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 多人貪食蛇</title>
    <style>
        body { margin:0; overflow:hidden; background:#02050f; font-family:"Microsoft JhengHei",sans-serif; touch-action:none; }
        #game-container { position:absolute; top:0; left:0; width:100%; height:100%; }

        #overlay {
            position:absolute; bottom:0; left:0; width:100%;
            background:rgba(5,10,26,0.85); padding:5px 0;
            display:flex; flex-direction:column; align-items:center;
            backdrop-filter:blur(10px); z-index:100;
            border-top:1px solid rgba(0,242,255,0.2);
        }
        #selection-grid {
            display:grid; grid-template-columns:repeat(20,1fr);
            gap:2px; width:98%; max-width:1200px;
        }
        .character-card {
            background:rgba(255,255,255,0.03); border:1px solid #1a2a4a;
            cursor:pointer; padding:1px; position:relative;
            transition:transform 0.2s; text-align:center;
        }
        .character-card.active  { border-color:#00f2ff; background:rgba(0,242,255,0.2); transform:scale(1.1); }
        .character-card.online::after {
            content:""; position:absolute; top:2px; right:2px;
            width:6px; height:6px; background:#00ff00; border-radius:50%; box-shadow:0 0 5px #00ff00;
        }
        .character-icon { width:100%; aspect-ratio:1/1; background-size:cover; background-position:center; background-color:#111; }
        .character-name { font-size:7px; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transform:scale(0.85); }

        #joystick-zone { position:fixed; bottom:80px; left:30px; width:120px; height:120px; z-index:200; display:none; }
        #joystick-base { width:100%; height:100%; background:rgba(255,255,255,0.1); border-radius:50%; border:2px solid rgba(255,255,255,0.2); position:relative; }
        #joystick-knob { position:absolute; top:35px; left:35px; width:50px; height:50px; background:rgba(0,242,255,0.6); border-radius:50%; box-shadow:0 0 15px rgba(0,242,255,0.5); }

        #status-ui {
            position:fixed; top:15px; left:15px; color:#00f2ff;
            background:rgba(5,10,26,0.7); padding:5px 12px; font-size:11px;
            border-left:2px solid #00f2ff; pointer-events:none; z-index:150;
            line-height:1.8;
        }
        #score-ui {
            position:fixed; top:15px; right:15px; color:#ffee44;
            background:rgba(5,10,26,0.7); padding:5px 14px; font-size:14px;
            border-right:2px solid #ffee44; pointer-events:none; z-index:150;
            text-align:right; line-height:2;
        }
        #eat-flash {
            position:fixed; top:42%; left:50%; transform:translate(-50%,-50%);
            font-size:32px; font-weight:bold; color:#fff;
            pointer-events:none; z-index:300; opacity:0;
            transition:opacity 0.15s; text-shadow:0 0 20px #0ff;
        }
        @media (pointer:coarse) { #joystick-zone { display:block; } }
    </style>
</head>
<body>
<div id="game-container"></div>
<div id="status-ui">🔄 正在連線...</div>
<div id="score-ui">🐍 長度：1</div>
<div id="eat-flash"></div>
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
<div id="overlay"><div id="selection-grid"></div></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { initializeApp }              from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

// ════════════════════════════════════════════
//  Firebase 設定
// ════════════════════════════════════════════
const firebaseConfig = {
    apiKey:"AIzaSyB2rWVtiPF7FUBNztORts6X6lS2MGLUqvE",
    authDomain:"game-ee5db.firebaseapp.com",
    projectId:"game-ee5db",
    storageBucket:"game-ee5db.firebasestorage.app",
    messagingSenderId:"382312559360",
    appId:"1:382312559360:web:744e3b69d23321123939e5"
};
const APP_ID = 'snake-multi';

// ════════════════════════════════════════════
//  遊戲常數
// ════════════════════════════════════════════
const FOOD_MAX      = 15;
const FOOD_EAT_DIST = 1.8;
const STEAL_DIST    = 1.3;
const SEG_SPACING   = 10;
const MOVE_SPEED    = 0.18;
const TURN_SPEED    = 0.055;
const FIELD_SIZE    = 38;
const STEAL_AMOUNT  = 3;
const FOOD_COLORS   = [0xff3333,0x33ff66,0xffff33,0xff33ff,0x33ffff,0xff8800,0xffffff,0x00aaff,0xff6699];

// ════════════════════════════════════════════
//  角色
// ════════════════════════════════════════════
const students = [
    {name:"高安妤",color:0xff4444},{name:"饒允志",color:0x44ffff},
    {name:"朱采曼",color:0x4444ff},{name:"林宸慈",color:0x44ff44},
    {name:"駱采綺",color:0xffff44},{name:"莊芷媛",color:0xff44ff},
    {name:"蘇汶欣",color:0x8844ff},{name:"葉子菱",color:0xff8844},
    {name:"張羽涵",color:0xffffff},{name:"高子媛",color:0xffeeaa},
    {name:"金煜喬",color:0xaa8866},{name:"陳品霖",color:0x888888},
    {name:"許博勛",color:0xffaa00},{name:"陳湘妮",color:0xffeeee},
    {name:"劉奕汝",color:0xffcccc},{name:"蔡明樺",color:0xccccff},
    {name:"鍾凱羽",color:0xccffcc},{name:"學員18",color:0x445566},
    {name:"學員19",color:0x556677},{name:"學員20",color:0x667788}
];

// ════════════════════════════════════════════
//  Three.js 場景
// ════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02050f);
scene.fog = new THREE.Fog(0x02050f, 25, 90);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.getElementById('game-container').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const pLight = new THREE.PointLight(0x00f2ff, 2, 60);
pLight.position.set(0,12,0); scene.add(pLight);
scene.add(new THREE.GridHelper(500, 100, 0x1a2a4a, 0x051020));

// ════════════════════════════════════════════
//  本地玩家狀態
// ════════════════════════════════════════════
let userId=null, myIdx=0;
const myGroup=new THREE.Group(); scene.add(myGroup);
let myMixer=null, myActions={};
let mySegments=[], myPath=[], mySegCount=0;

// ════════════════════════════════════════════
//  遠端玩家 / 食物 / DB 參照
// ════════════════════════════════════════════
const otherPlayers={};
const foodMeshes={};   // docId → THREE.Mesh
const stealCD={};      // uid → timestamp

let db=null, foodColRef=null;

// ════════════════════════════════════════════
//  輸入
// ════════════════════════════════════════════
const loader=new GLTFLoader(), keys={};
let joyActive=false, joyX=0, joyY=0;

// ════════════════════════════════════════════
//  工具
// ════════════════════════════════════════════
function safeSetRunning(actions, run) {
    if (!actions?.idle || !actions?.run) return;
    try {
        if (run && !actions.run.isRunning()) { actions.idle.fadeOut(0.2); actions.run.reset().fadeIn(0.2).play(); }
        else if (!run && actions.run.isRunning()) { actions.run.fadeOut(0.2); actions.idle.reset().fadeIn(0.2).play(); }
    } catch(e){}
}

async function loadModel(idx, grp) {
    grp.clear();
    return new Promise(resolve => {
        loader.load(`student_${idx}.glb`, gltf => {
            grp.add(gltf.scene);
            const mixer=new THREE.AnimationMixer(gltf.scene), anims=gltf.animations, actions={};
            if (anims[0]) { actions.idle=mixer.clipAction(anims[0]); actions.idle.play(); }
            if (anims[2]||anims[1]) actions.run=mixer.clipAction(anims[2]||anims[1]);
            resolve({mixer,actions});
        }, undefined, () => {
            const m=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.8,0.8),
                new THREE.MeshStandardMaterial({color:students[idx].color}));
            m.position.y=0.9; grp.add(m);
            const gl=new THREE.PointLight(students[idx].color,0.4,3); gl.position.y=1; grp.add(gl);
            resolve({mixer:null,actions:{}});
        });
    });
}

function setSegCount(segArr, count, color) {
    while (segArr.length<count) {
        const s=new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),
            new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.4}));
        scene.add(s); segArr.push(s);
    }
    while (segArr.length>count) scene.remove(segArr.pop());
}

let flashTimer=null;
function showFlash(msg) {
    const el=document.getElementById('eat-flash');
    el.textContent=msg; el.style.opacity=1;
    clearTimeout(flashTimer);
    flashTimer=setTimeout(()=>el.style.opacity=0, 750);
}

function updateScore() {
    document.getElementById('score-ui').innerHTML=`🐍 長度：${mySegCount+1}`;
}

function setStatus(line1, line2='') {
    document.getElementById('status-ui').innerHTML = line1 + (line2?`<br>${line2}`:'');
}

// ════════════════════════════════════════════
//  食物系統
// ════════════════════════════════════════════
function buildFoodMesh(docId, x, z) {
    if (foodMeshes[docId]) return;
    const color = FOOD_COLORS[Math.floor(Math.random()*FOOD_COLORS.length)];
    const geo   = new THREE.SphereGeometry(0.42, 12, 12);
    const mat   = new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.85});
    const mesh  = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.42, z);
    const light = new THREE.PointLight(color, 1.2, 5);
    mesh.add(light);
    scene.add(mesh);
    foodMeshes[docId] = mesh;
}

function eraseFoodMesh(docId) {
    if (!foodMeshes[docId]) return;
    scene.remove(foodMeshes[docId]);
    delete foodMeshes[docId];
}

let lastSpawnAttempt = 0;
async function trySpawnFood() {
    if (!db || !foodColRef) return;
    const now = Date.now();
    if (now - lastSpawnAttempt < 2500) return;
    lastSpawnAttempt = now;

    try {
        const snap = await getDocs(foodColRef);
        const have = snap.size;
        if (have >= FOOD_MAX) return;
        const need = Math.min(4, FOOD_MAX - have);
        const writes = [];
        for (let i=0; i<need; i++) {
            const x = (Math.random()*2-1)*FIELD_SIZE;
            const z = (Math.random()*2-1)*FIELD_SIZE;
            writes.push(addDoc(foodColRef, {x, z, ts:Date.now()}));
        }
        await Promise.all(writes);
        console.log(`[Food] spawned ${need} (total→${have+need})`);
    } catch(err) {
        console.error('[Food] spawn error:', err.message);
        setStatus('多人連線中 ✅','⚠️ 食物寫入失敗：'+err.code);
    }
}

async function eatFood(docId) {
    if (!foodMeshes[docId]) return;      // 已被別人吃掉
    eraseFoodMesh(docId);
    mySegCount++;
    setSegCount(mySegments, mySegCount, students[myIdx].color);
    updateScore();
    showFlash('🍎 +1');
    if (!db) return;
    try {
        // ★ 用 doc(db, fullPath) 確保引用正確
        await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','food',docId));
    } catch(e) { console.warn('[Food] delete err:', e.message); }
}

// ════════════════════════════════════════════
//  碰撞奪取
// ════════════════════════════════════════════
async function trySteal(uid) {
    const now=Date.now();
    if (stealCD[uid]&&now-stealCD[uid]<2000) return;
    stealCD[uid]=now;
    const p=otherPlayers[uid];
    if (!p||p.segCount<=0||!db) return;
    const n=Math.min(STEAL_AMOUNT, p.segCount);
    mySegCount+=n;
    setSegCount(mySegments, mySegCount, students[myIdx].color);
    showFlash(`⚡ +${n}`);
    updateScore();
    try {
        await setDoc(doc(db,'artifacts',APP_ID,'public','data','players',uid),
            {segCount:Math.max(0,p.segCount-n)},{merge:true});
    } catch(e){ console.warn('[Steal] err:',e.message); }
}

// ════════════════════════════════════════════
//  Firebase 啟動
// ════════════════════════════════════════════
async function initFirebase() {
    try {
        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        db = getFirestore(app);

        setStatus('🔄 正在驗證身分...');
        await signInAnonymously(auth);

        onAuthStateChanged(auth, user => {
            if (!user) return;
            userId = user.uid;
            setStatus('多人連線中 ✅', 'WASD / 搖桿 移動');

            // 集合引用
            foodColRef = collection(db,'artifacts',APP_ID,'public','data','food');
            const playersCol = collection(db,'artifacts',APP_ID,'public','data','players');

            // ── 食物監聽 ──
            onSnapshot(foodColRef, snap => {
                const live = new Set(snap.docs.map(d=>d.id));
                // 移除已不存在的食物 Mesh
                Object.keys(foodMeshes).forEach(id => { if (!live.has(id)) eraseFoodMesh(id); });
                // 建立新食物 Mesh
                snap.forEach(d => buildFoodMesh(d.id, d.data().x, d.data().z));
                setStatus('多人連線中 ✅', `WASD / 搖桿 移動　🍎 場上食物：${snap.size}`);
            }, err => {
                console.error('[Firestore food]', err);
                setStatus('多人連線中 ✅', '⚠️ 食物監聽失敗：'+err.code);
            });

            // ── 玩家監聽 ──
            onSnapshot(playersCol, snap => {
                const liveIds = new Set(snap.docs.map(d=>d.id));
                snap.forEach(async dSnap => {
                    const data=dSnap.data(), uid=dSnap.id;
                    if (uid===userId) {
                        // 被偷同步
                        if (typeof data.segCount==='number' && data.segCount<mySegCount) {
                            const lost=mySegCount-data.segCount;
                            mySegCount=data.segCount;
                            setSegCount(mySegments,mySegCount,students[myIdx].color);
                            showFlash(`💀 -${lost}`);
                            updateScore();
                        }
                        return;
                    }
                    handleRemote(uid, data);
                });
                Object.keys(otherPlayers).forEach(uid=>{ if (!liveIds.has(uid)) removeRemote(uid); });
                updateCardUI(snap.docs.map(d=>d.data().idx));
            }, err => console.error('[Firestore players]', err));

            // ── 位置上傳 ──
            setInterval(async()=>{
                if (!userId||!db) return;
                try {
                    await setDoc(doc(db,'artifacts',APP_ID,'public','data','players',userId), {
                        x:myGroup.position.x, z:myGroup.position.z,
                        rot:myGroup.rotation.y, idx:myIdx,
                        segCount:mySegCount,
                        isMoving:keys.isMoving||joyActive,
                        lastSeen:Date.now()
                    },{merge:true});
                } catch(e){}
            }, 100);

            // ── 食物定時補充 ──
            trySpawnFood();
            setInterval(trySpawnFood, 2500);
        });

    } catch(err) {
        console.error('[Firebase]', err);
        setStatus('⚠️ 連線失敗', err.message);
    }
}

// ════════════════════════════════════════════
//  遠端玩家管理
// ════════════════════════════════════════════
async function handleRemote(uid, data) {
    if (!otherPlayers[uid]) {
        const grp=new THREE.Group(); scene.add(grp);
        otherPlayers[uid]={grp,segments:[],path:[],idx:-1,segCount:0};
    }
    const p=otherPlayers[uid];
    p.targetPos = new THREE.Vector3(data.x,0,data.z);
    p.targetRot = data.rot;
    p.remoteMoving = data.isMoving;
    p.segCount = data.segCount??0;
    if (p.idx!==data.idx) {
        p.idx=data.idx;
        const r=await loadModel(p.idx,p.grp); p.mixer=r.mixer; p.actions=r.actions;
    }
    setSegCount(p.segments, p.segCount, students[data.idx]?.color??0xffffff);
}

function removeRemote(uid) {
    if (!otherPlayers[uid]) return;
    scene.remove(otherPlayers[uid].grp);
    otherPlayers[uid].segments.forEach(s=>scene.remove(s));
    delete otherPlayers[uid];
}

// ════════════════════════════════════════════
//  搖桿
// ════════════════════════════════════════════
const knob=document.getElementById('joystick-knob');
addEventListener('touchstart',e=>{
    const t=e.touches[0];
    if (t.clientX<200&&t.clientY>innerHeight-250) joyActive=true;
});
addEventListener('touchmove',e=>{
    if (!joyActive) return;
    const t=e.touches[0];
    const r=document.getElementById('joystick-base').getBoundingClientRect();
    joyX=(t.clientX-r.left-r.width/2)/60;
    joyY=(t.clientY-r.top-r.height/2)/60;
    const d=Math.hypot(joyX,joyY); if(d>1){joyX/=d;joyY/=d;}
    knob.style.transform=`translate(${joyX*35}px,${joyY*35}px)`;
});
addEventListener('touchend',()=>{joyActive=false;joyX=joyY=0;knob.style.transform='translate(0,0)';});

// ════════════════════════════════════════════
//  主動畫迴圈
// ════════════════════════════════════════════
const clock=new THREE.Clock();
let foodBob=0;

function animate() {
    requestAnimationFrame(animate);
    const dt=clock.getDelta();
    foodBob+=dt*2;

    // ── 本地移動 ──
    let spd=0;
    if (keys['w']||keys['arrowup'])    spd= MOVE_SPEED;
    if (keys['s']||keys['arrowdown'])  spd=-MOVE_SPEED;
    if (keys['a']||keys['arrowleft'])  myGroup.rotation.y+=TURN_SPEED;
    if (keys['d']||keys['arrowright']) myGroup.rotation.y-=TURN_SPEED;
    if (joyActive) {
        const d=Math.hypot(joyX,joyY);
        if (d>0.1){myGroup.rotation.y=Math.atan2(-joyX,-joyY);spd=MOVE_SPEED*d;}
    }

    const moving=spd!==0;
    if (moving) myGroup.translateZ(spd);
    keys.isMoving=moving;
    if (myMixer){myMixer.update(dt);safeSetRunning(myActions,moving);}

    // ── 路徑記錄 & 身體跟隨 ──
    myPath.unshift({pos:myGroup.position.clone()});
    if (myPath.length>500) myPath.pop();
    mySegments.forEach((s,i)=>{
        const step=(i+1)*SEG_SPACING;
        if (myPath[step]) s.position.lerp(myPath[step].pos, 0.4);
    });

    // ── 食物動畫 + 吃食物判定 ──
    const hp=myGroup.position;
    Object.entries(foodMeshes).forEach(([id,mesh])=>{
        // 浮動動畫
        mesh.position.y = 0.42 + Math.sin(foodBob + id.charCodeAt(0)*0.5)*0.2;
        mesh.rotation.y += dt*1.5;
        // 吃到了？
        if (hp.distanceTo(mesh.position) < FOOD_EAT_DIST) {
            eatFood(id); // async，但 mesh 先消除不影響
        }
    });

    // ── 碰撞奪取判定（頭碰對方身體）──
    for (const [uid,p] of Object.entries(otherPlayers)) {
        for (const seg of p.segments) {
            if (hp.distanceTo(seg.position) < STEAL_DIST) {
                trySteal(uid); break;
            }
        }
    }

    // ── 遠端玩家更新 ──
    for (const [,p] of Object.entries(otherPlayers)) {
        if (p.targetPos) p.grp.position.lerp(p.targetPos,0.2);
        if (p.targetRot!==undefined)
            p.grp.rotation.y=THREE.MathUtils.lerp(p.grp.rotation.y,p.targetRot,0.2);
        if (p.mixer){p.mixer.update(dt);safeSetRunning(p.actions,p.remoteMoving);}
        p.path.unshift({pos:p.grp.position.clone()});
        if (p.path.length>500) p.path.pop();
        p.segments.forEach((s,i)=>{
            const step=(i+1)*SEG_SPACING;
            if (p.path[step]) s.position.lerp(p.path[step].pos,0.4);
        });
    }

    // ── 攝影機 ──
    const ic=new THREE.Vector3(0,6,-14).applyMatrix4(myGroup.matrixWorld);
    camera.position.lerp(ic,0.1);
    camera.lookAt(myGroup.position.x,1,myGroup.position.z);
    renderer.render(scene,camera);
}

// ════════════════════════════════════════════
//  UI
// ════════════════════════════════════════════
function initUI() {
    const grid=document.getElementById('selection-grid');
    students.forEach((s,i)=>{
        const card=document.createElement('div');
        card.className='character-card'; card.id=`card-${i}`;
        const hex=new THREE.Color(s.color).getHexString();
        card.innerHTML=`
            <div class="character-icon" style="background-color:#${hex};background-image:url('icon_${i}.jpg')"></div>
            <div class="character-name">${s.name}</div>`;
        card.onclick=()=>switchChar(i);
        grid.appendChild(card);
    });
}

function updateCardUI(onlineIdxs) {
    document.querySelectorAll('.character-card').forEach((c,i)=>{
        c.classList.toggle('online',onlineIdxs.includes(i)&&i!==myIdx);
        c.classList.toggle('active',i===myIdx);
    });
}

async function switchChar(idx) {
    myIdx=idx;
    document.querySelectorAll('.character-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
    setSegCount(mySegments,mySegCount,students[idx].color);
    const r=await loadModel(idx,myGroup);
    myMixer=r.mixer; myActions=r.actions;
}

addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; });
addEventListener('keyup',  e=>{ keys[e.key.toLowerCase()]=false; });
addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

// ════════════════════════════════════════════
//  啟動
// ════════════════════════════════════════════
initUI();
switchChar(0);
initFirebase();
animate();
</script>
</body>
</html>

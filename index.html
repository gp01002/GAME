<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永平高中5GVR虛擬角色</title>
    <style>
        *{box-sizing:border-box;}
        body{margin:0;overflow:hidden;background:#02050f;font-family:"Microsoft JhengHei",sans-serif;touch-action:none;}
        #game-container{position:fixed;top:0;left:0;width:100%;height:100%;}

        /* 底部角色列 */
        #overlay{position:absolute;bottom:0;left:0;width:100%;background:rgba(5,10,26,0.88);padding:4px 0;backdrop-filter:blur(10px);z-index:100;border-top:1px solid rgba(0,242,255,0.25);}
        #selection-grid{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;width:100%;padding:0 4px;gap:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        #selection-grid::-webkit-scrollbar{display:none;}
        .character-card{flex:0 0 52px;height:60px;background:rgba(255,255,255,0.04);border:1px solid #1a2a4a;cursor:pointer;padding:1px;position:relative;transition:transform 0.2s;text-align:center;border-radius:4px;}
        .character-card.active{border-color:#00f2ff;background:rgba(0,242,255,0.2);transform:scale(1.1);}
        .character-card.online::after{content:"";position:absolute;top:2px;right:2px;width:7px;height:7px;background:#00ff00;border-radius:50%;box-shadow:0 0 6px #00ff00;}
        .character-icon{width:100%;aspect-ratio:1/1;background-size:cover;background-position:center;background-color:#111;border-radius:3px;}
        .character-name{font-size:7px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}

        /* 搖桿 */
        #joystick-zone{position:fixed;bottom:80px;left:20px;width:110px;height:110px;z-index:500;display:none;}
        #joystick-base{width:100%;height:100%;background:rgba(255,255,255,0.12);border-radius:50%;border:2px solid rgba(0,242,255,0.5);position:relative;}
        #joystick-knob{position:absolute;top:32px;left:32px;width:46px;height:46px;background:rgba(0,242,255,0.7);border-radius:50%;box-shadow:0 0 16px rgba(0,242,255,0.7);}

        /* 發射鈕 */
        #shoot-btn{position:fixed;bottom:90px;right:20px;width:72px;height:72px;border-radius:50%;background:rgba(255,80,80,0.85);border:3px solid #ff4444;color:#fff;font-size:26px;display:none;align-items:center;justify-content:center;z-index:500;cursor:pointer;box-shadow:0 0 22px rgba(255,80,80,0.7);user-select:none;-webkit-user-select:none;touch-action:none;}
        #shoot-btn:active{transform:scale(0.90);}

        /* UI */
        #status-ui{position:fixed;top:15px;left:15px;color:#00f2ff;background:rgba(5,10,26,0.7);padding:5px 12px;font-size:11px;border-left:2px solid #00f2ff;pointer-events:none;z-index:150;line-height:1.8;}
        #score-ui{position:fixed;top:15px;right:15px;color:#ffee44;background:rgba(5,10,26,0.7);padding:5px 14px;font-size:14px;border-right:2px solid #ffee44;pointer-events:none;z-index:150;text-align:right;line-height:2;}
        #timer-ui{position:fixed;top:15px;left:50%;transform:translateX(-50%);color:#fff;font-size:22px;font-weight:bold;background:rgba(5,10,26,0.75);padding:4px 20px;border-radius:20px;border:1px solid rgba(0,242,255,0.4);pointer-events:none;z-index:150;text-shadow:0 0 10px #0ff;letter-spacing:2px;}
        #host-badge{position:fixed;top:55px;left:50%;transform:translateX(-50%);color:#ffee44;font-size:11px;background:rgba(30,20,0,0.7);padding:3px 12px;border-radius:10px;pointer-events:none;z-index:150;display:none;}
        #eat-flash{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:bold;color:#fff;pointer-events:none;z-index:300;opacity:0;transition:opacity 0.15s;text-shadow:0 0 24px #0ff;}
        #hint-ui{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:10px;pointer-events:none;z-index:150;white-space:nowrap;}

        /* 倒數警告 */
        #timer-ui.warn{color:#ff4444;border-color:#ff4444;text-shadow:0 0 10px #f00;animation:pulse 0.5s infinite alternate;}
        @keyframes pulse{from{opacity:1}to{opacity:0.6}}

        /* 回合結果 */
        #round-result{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);z-index:500;}
        #round-result .winner-title{font-size:44px;color:#ffee44;text-shadow:0 0 30px #ff0;margin-bottom:10px;}
        #round-result .winner-name{font-size:30px;color:#fff;text-shadow:0 0 20px #0ff;margin-bottom:6px;}
        #round-result .scoreboard{color:#ddd;font-size:15px;line-height:2.2;text-align:center;margin:16px 0 24px;}
        #round-result .next-btn{padding:12px 36px;font-size:18px;border:none;border-radius:30px;background:linear-gradient(135deg,#00f2ff,#0044ff);color:#fff;cursor:pointer;box-shadow:0 0 20px rgba(0,200,255,0.5);}

        @media (pointer:coarse){
            #joystick-zone{display:block !important;}
            #shoot-btn{display:flex !important;}
            #hint-ui{display:none;}
        }
    </style>
</head>

    <div class="winner-title">🏆 Winner!</div>
    <div class="winner-name" id="winner-name">—</div>

</div>

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});

function readVRPad(hand){
    if(!hand) return null;
    var s=hand.inputSource;
    if(s&&s.gamepad&&s.gamepad.axes&&s.gamepad.axes.length>=4)
        return {x:s.gamepad.axes[2], y:s.gamepad.axes[3]};
    return null;
}

function buildScene(){
    scene.background = new THREE.Color(0x87ceeb);  // 天藍 fallback
    scene.fog = new THREE.FogExp2(0x02050f, 0.012);
    // 星星
    const sp=[], sg=new THREE.BufferGeometry();
    for(let i=0;i<1000;i++) sp.push((Math.random()-.5)*400,Math.random()*80+5,(Math.random()-.5)*400);
    sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
    scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.18,transparent:true,opacity:0.7})));
    // 地板
    // 草地地板（純綠，無格線）
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(500,500),
        new THREE.MeshStandardMaterial({color:0x3a7d20,roughness:0.95,metalness:0.0}));
    floor.rotation.x=-Math.PI/2; // floor.receiveShadow=false; scene.add(floor);
    // 細微草地紋理用第二層半透明格線（非常淡）
    const grid=new THREE.GridHelper(500,80,0x2a6010,0x2a6010);
    grid.material.transparent=true; grid.material.opacity=0.08; grid.position.y=0.02; scene.add(grid);
    // 燈光
    scene.add(new THREE.AmbientLight(0xffffff,2.5));
    const sun=new THREE.DirectionalLight(0xffffff,3); sun.position.set(20,40,20); // sun.castShadow=false; scene.add(sun);
    const rl1=new THREE.PointLight(0x88ddff,4,120); rl1.position.set(0,20,0); scene.add(rl1);
    const rl2=new THREE.PointLight(0xffccaa,2,80);  rl2.position.set(-30,10,30); scene.add(rl2);
    const rl3=new THREE.PointLight(0xaaffcc,2,80);  rl3.position.set(30,10,-30); scene.add(rl3);
    // 邊界柱
    const pm=new THREE.MeshStandardMaterial({color:0x00f2ff,emissive:0x00f2ff,emissiveIntensity:0.8,transparent:true,opacity:0.4});
    [[-1,1],[1,1],[1,-1],[-1,-1]].forEach(([sx,sz])=>{
        const p=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,6,8),pm);
        p.position.set(sx*CONFIG.FIELD_SIZE,2,sz*CONFIG.FIELD_SIZE); scene.add(p);
        const pl=new THREE.PointLight(0x00f2ff,1.5,12); pl.position.set(sx*CONFIG.FIELD_SIZE,6,sz*CONFIG.FIELD_SIZE); scene.add(pl);
    });
    // 天空
    if(CONFIG.SKY_IMG) new THREE.TextureLoader().load(CONFIG.SKY_IMG,t=>{t.mapping=THREE.EquirectangularReflectionMapping;scene.background=t;});

    // ── 起伏地形 ─────────────────────────────────
    const terrainSize=120, terrainSegs=32;
    const terrainGeo=new THREE.PlaneGeometry(terrainSize,terrainSize,terrainSegs,terrainSegs);
    terrainGeo.rotateX(-Math.PI/2);
    const pos=terrainGeo.attributes.position;
    for(let i=0;i<pos.count;i++){
        const x=pos.getX(i), z=pos.getZ(i);
        const dist=Math.sqrt(x*x+z*z);
        // 場地中央平坦，外圍起伏
        const flatRadius=50;
        const slope=Math.max(0,(dist-flatRadius)/30);
        let h = slope*(4+Math.sin(x*0.12)*3+Math.cos(z*0.09)*3);
        h += Math.sin(x*0.4)*0.15+Math.cos(z*0.35)*0.15; // 細微起伏
        pos.setY(i, h);
    }
    terrainGeo.computeVertexNormals();
    const terrainMat=new THREE.MeshStandardMaterial({color:0x3a7520,roughness:0.92,metalness:0.0});
    const terrain=new THREE.Mesh(terrainGeo,terrainMat);
    // terrain.receiveShadow=false;
    scene.add(terrain);

    // ── 山丘（外圍）────────────────────────────
    const hillMat=new THREE.MeshStandardMaterial({color:0x3a6b22,roughness:1,metalness:0});
    const hillPositions=[
        [72,0,72],[-72,0,72],[72,0,-72],[-72,0,-72],
        [90,0,10],[-90,0,-15],[15,0,88],[-20,0,-88],
        [55,0,80],[-60,0,78]
    ];
    hillPositions.forEach(function(hp){ var x=hp[0], z=hp[2];
        const h=8+Math.random()*10, r=10+Math.random()*8;
        const hg=new THREE.ConeGeometry(r,h,5);
        const hm=new THREE.Mesh(hg,hillMat); 
        hm.position.set(x,h*0.35,z);
        hm.rotation.y=Math.random()*Math.PI;
        scene.add(hm);
        // 雪帽（高山）
        if(h>14){
            const snowCap=new THREE.Mesh(new THREE.ConeGeometry(r*0.35,h*0.28,6),new THREE.MeshStandardMaterial({color:0xeeeeff,roughness:0.9}));
            snowCap.position.set(x,h*0.35+h*0.44,z); scene.add(snowCap);
        }
    });

    // ── 水窪 ────────────────────────────────────
    const waterMat=new THREE.MeshStandardMaterial({color:0x0a1a2a,metalness:0.7,roughness:0.05,transparent:true,opacity:0.88});
    [
        {x:18,z:-22,rx:5.5,rz:3.2},{x:-20,z:15,rx:4,rz:4.5},
        {x:5,z:30,rx:3,rz:2},{x:-30,z:-18,rx:6,rz:2.5},
        {x:25,z:10,rx:2.5,rz:3.5},{x:-10,z:-30,rx:3.5,rz:2.2}
    ].forEach(({x,z,rx,rz})=>{
        const curve=new THREE.EllipseCurve(0,0,rx,rz,0,Math.PI*2);
        const pts=curve.getPoints(20);
        const shape=new THREE.Shape(pts);
        const waterMesh=new THREE.Mesh(new THREE.ShapeGeometry(shape),waterMat.clone());
        waterMesh.rotation.x=-Math.PI/2; waterMesh.position.set(x,0.04,z);
        scene.add(waterMesh);
        // 水面光點
        const wl=new THREE.PointLight(0x224488,0.6,10); wl.position.set(x,0.5,z); scene.add(wl);
    });

    // ── 卡通樹 ────────────────────────────────────
    const trunkMat=new THREE.MeshLambertMaterial({color:0x8B5E3C});
    const foliageColors=[0x2d8a2d,0x3aa03a,0x228822,0x4ab84a,0x1a7a1a];
    const treePositions=[];
    for(let i=0;i<18;i++){
        let tx,tz,attempts=0;
        do{
            const angle=Math.random()*Math.PI*2, dist=20+Math.random()*45;
            tx=Math.cos(angle)*dist; tz=Math.sin(angle)*dist;
            attempts++;
        }while(treePositions.some(p=>Math.hypot(p[0]-tx,p[1]-tz)<5)&&attempts<30);
        treePositions.push([tx,tz]);
        const s=0.8+Math.random()*0.8;
        const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.18*s,0.28*s,1.8*s,6),trunkMat);
        trunk.position.set(tx,0.9*s,tz); trunk.castShadow=true; scene.add(trunk);
        // 2層葉子（卡通感）
        const fc=foliageColors[Math.floor(Math.random()*foliageColors.length)];
        const fMat=new THREE.MeshLambertMaterial({color:fc});
        const bottom=new THREE.Mesh(new THREE.ConeGeometry(1.6*s,2.0*s,7),fMat);
        bottom.position.set(tx,2.4*s,tz); bottom.castShadow=true; scene.add(bottom);
        const top=new THREE.Mesh(new THREE.ConeGeometry(1.0*s,1.6*s,6),fMat);
        top.position.set(tx,4.0*s,tz); top.castShadow=true; scene.add(top);
    }

    // ── 石頭 ─────────────────────────────────────
    const stoneMats=[
        new THREE.MeshStandardMaterial({color:0x888888,roughness:0.85,metalness:0.05}),
        new THREE.MeshStandardMaterial({color:0x6a6a6a,roughness:0.9,metalness:0.0}),
        new THREE.MeshStandardMaterial({color:0x9a8a7a,roughness:0.8,metalness:0.08}),
    ];
    for(let i=0;i<8;i++){
        const angle=Math.random()*Math.PI*2, dist=15+Math.random()*50;
        const sx=Math.cos(angle)*dist, sz=Math.sin(angle)*dist;
        const sw=0.4+Math.random()*1.0, sh=0.3+Math.random()*0.7, sd=0.4+Math.random()*0.9;
        const stoneGeo=new THREE.DodecahedronGeometry(sw*0.8,0);
        const stone=new THREE.Mesh(stoneGeo, stoneMats[Math.floor(Math.random()*stoneMats.length)]);
        stone.position.set(sx,sh*0.4,sz);
        stone.rotation.set(Math.random()*0.5,Math.random()*Math.PI,Math.random()*0.5);
        stone.scale.set(1,sh/sw,sd/sw);
        stone.castShadow=true; stone.receiveShadow=true;
        scene.add(stone);
    }

    // ── 蘑菇（點綴）────────────────────────────
    for(let i=0;i<8;i++){
        const angle=Math.random()*Math.PI*2, dist=8+Math.random()*35;
        const mx=Math.cos(angle)*dist, mz=Math.sin(angle)*dist;
        const ms=0.35+Math.random()*0.4;
        const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.08*ms,0.12*ms,0.5*ms,6),new THREE.MeshLambertMaterial({color:0xeeeecc}));
        stem.position.set(mx,0.25*ms,mz); scene.add(stem);
        const capColor=[0xff3333,0xff6622,0xffaa00,0xcc2222][Math.floor(Math.random()*4)];
        const cap=new THREE.Mesh(new THREE.SphereGeometry(0.28*ms,8,4,0,Math.PI*2,0,Math.PI*0.55),new THREE.MeshLambertMaterial({color:capColor}));
        cap.position.set(mx,0.55*ms,mz); scene.add(cap);
    }
}
buildScene();

// ════════════════════════════════════════
//  天氣系統（純本地粒子）
// ════════════════════════════════════════
let wxParticles=null, wxType='clear', wxTimer=0;
const WX_INTERVAL=45;

function startWeather(type){
    if(wxParticles){scene.remove(wxParticles);wxParticles=null;}
    wxType=type;
    if(type==='clear'){showFlash('☀️ 天氣晴朗');return;}
    const n=type==='rain'?800:400;
    const pos=new Float32Array(n*3), vel=[];
    for(let i=0;i<n;i++){
        pos[i*3]=(Math.random()-.5)*100; pos[i*3+1]=Math.random()*40+5; pos[i*3+2]=(Math.random()-.5)*100;
        vel.push(type==='rain'?new THREE.Vector3((Math.random()-.5)*0.02,-0.6,0):
                 type==='snow'?new THREE.Vector3((Math.random()-.5)*0.03,-0.08,(Math.random()-.5)*0.03):
                               new THREE.Vector3((Math.random()-.5)*0.05,-0.05,(Math.random()-.5)*0.05));
    }
    const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const mat=new THREE.PointsMaterial({
        color:type==='rain'?0xaaccff:type==='snow'?0xffffff:0xffaacc,
        size:type==='rain'?0.12:0.3, transparent:true, opacity:type==='rain'?0.6:0.85
    });
    wxParticles=new THREE.Points(geo,mat);
    wxParticles.userData={vel,n};
    scene.add(wxParticles);
    showFlash(type==='rain'?'🌧️ 下雨了！':type==='snow'?'❄️ 下雪了！':'🌸 花瓣飄落！');
}

function tickWeather(dt){
    wxTimer+=dt;
    if(wxTimer>WX_INTERVAL){ wxTimer=0; startWeather(['rain','snow','petals','clear'][Math.floor(Math.random()*4)]); }
    if(!wxParticles) return;
    const p=wxParticles.geometry.attributes.position.array;
    const {vel,n}=wxParticles.userData;
    for(let i=0;i<n;i++){
        p[i*3]+=vel[i].x; p[i*3+1]+=vel[i].y; p[i*3+2]+=vel[i].z;
        if(wxType==='petals') vel[i].x=Math.sin(Date.now()*0.001+i)*0.04;
        if(p[i*3+1]<-1){p[i*3]=(Math.random()-.5)*100;p[i*3+1]=40;p[i*3+2]=(Math.random()-.5)*100;}
    }
    wxParticles.geometry.attributes.position.needsUpdate=true;
}

// 嘗試成為主機（只有 session 中沒有有效主機才成功）
async function tryBecomeHost(){
    if(!db||!userId) return;
    try{
        const ref=doc(db, PATH.session);
        const snap=await getDoc(ref);
        const now=Date.now();
        const s=snap.exists()?snap.data():{};

        // 判斷當前主機是否還有效（5秒內有心跳）
        const hostAlive = s.hostId && s.hostAlive && (now - s.hostAlive < 8000);

        if(!hostAlive){
            // 無有效主機，我來當
            await setDoc(ref,{
                hostId:    userId,
                hostAlive: now,
                roundEnd:  now + CONFIG.ROUND_DURATION*1000,
                round:     (s.round??0) + (hostAlive?0:1)
            },{merge:true});
            // 再確認一次（防競爭）
            const confirm=await getDoc(ref);
            if(confirm.data()?.hostId===userId){
                isHost=true;
                document.getElementById('host-badge').style.display='block';
                console.log('[Host] 成為主機');
                // 主機立刻補充食物
                await fillFood();
            }
        }
    }catch(e){console.warn('[Host]',e.code);}
}

let foodCol=null;

function makeFoodMesh(t){
    const grp=new THREE.Group();
    if(CONFIG.FOOD_USE_GLB&&foodGLBCache[t%CONFIG.FOOD_COUNT]){
        const m=foodGLBCache[t%CONFIG.FOOD_COUNT].clone(true);
        m.scale.setScalar(CONFIG.FOOD_GLB_SCALE);
        m.traverse(n=>{if(n.isMesh) n.castShadow=true;});
        grp.add(m);
    } else {
        const c=FOOD_COLORS[t%FOOD_COLORS.length];
        const b=new THREE.Mesh(new THREE.SphereGeometry(0.42,12,12),new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.85}));
        grp.add(b);
        const l=new THREE.PointLight(c,3,8); grp.add(l);
    }
    return grp;
}

function addFoodMesh(id,x,z,t){
    if(foodMeshes[id]) return;
    const grp=makeFoodMesh(t??0);
    grp.position.set(x,0.5,z);
    grp.userData.t=t??0;
    scene.add(grp);
    foodMeshes[id]=grp;
}
function delFoodMesh(id){if(foodMeshes[id]){scene.remove(foodMeshes[id]);delete foodMeshes[id];}}

// 主機補充食物到 FOOD_MAX
async function fillFood(){
    if(!isHost||!foodCol) return;
    try{
        const snap=await getDocs(foodCol);
        const have=snap.size;
        if(have>=CONFIG.FOOD_MAX) return;
        const need=Math.min(6, CONFIG.FOOD_MAX-have);
        const batch=[];
        for(let i=0;i<need;i++){
            batch.push(addDoc(foodCol,{
                x:(Math.random()*2-1)*CONFIG.FIELD_SIZE,
                z:(Math.random()*2-1)*CONFIG.FIELD_SIZE,
                t:Math.floor(Math.random()*CONFIG.FOOD_COUNT)
            }));
        }
        await Promise.all(batch);
        console.log(`[Food] 補充 ${need} 顆，共 ${have+need}`);
    }catch(e){console.warn('[Food fill]',e.code);}
}

function updateTimer(){
    if(!roundEndTime) return;
    const left=Math.max(0,Math.ceil((roundEndTime-Date.now())/1000));
    const m=Math.floor(left/60), s=String(left%60).padStart(2,'0');
    const el=document.getElementById('timer-ui');
    el.textContent=`🕐 ${m}:${s}`;
    el.classList.toggle('warn',left<=10&&left>0);
    if(left<=0&&!roundOver) endRound();
}

function endRound(){
    if(roundOver) return;
    roundOver=true;
    const all=[{name:students[myIdx].name,score:myTail.length+1,isMe:true}];
    for(const [,p] of Object.entries(others))
        all.push({name:students[p.idx??0]?.name??'玩家',score:(p.segCount??0)+1});
    all.sort((a,b)=>b.score-a.score);
    const w=all[0];
    document.getElementById('winner-name').textContent=w.name+(w.isMe?' 🎉':'');
    document.getElementById('scoreboard').innerHTML=
        all.map((p,i)=>`${['🥇','🥈','🥉'][i]??'　'} ${p.name}　長度 ${p.score}`).join('<br>');
    document.getElementById('round-result').style.display='flex';
    document.getElementById('next-btn').onclick=startNewRound;
}

async function startNewRound(){
    document.getElementById('round-result').style.display='none';
    while(myTail.length) removeTail();
    updateScore();
    myGroup.position.set((Math.random()-.5)*20,0,(Math.random()-.5)*20);
    myPath=[];
    roundOver=false;
    document.getElementById('timer-ui').classList.remove('warn');

    if(isHost){
        // 主機設定新回合
        const newEnd=Date.now()+CONFIG.ROUND_DURATION*1000;
        roundEndTime=newEnd;
        await setDoc(doc(db,PATH.session),{roundEnd:newEnd},{merge:true});
        await fillFood();
    }
}

async function loadModel(idx,grp){
    grp.clear();
    return new Promise(resolve=>{
        loader.load(`student_${idx}.glb`,gltf=>{
            const m=gltf.scene;
            m.scale.setScalar(CONFIG.CHAR_SCALE);
            m.rotation.y=CONFIG.CHAR_MODEL_ROTATE;
            // traverse removed (shadow off)
            grp.add(m);
            const mixer=new THREE.AnimationMixer(m), a=gltf.animations, ac={};
            if(a[CONFIG.CHAR_IDLE_IDX]){ac.idle=mixer.clipAction(a[CONFIG.CHAR_IDLE_IDX]);ac.idle.play();}
            if(a[CONFIG.CHAR_RUN_IDX]) ac.run=mixer.clipAction(a[CONFIG.CHAR_RUN_IDX]);
            resolve({mixer,actions:ac});
        },undefined,()=>{
            const m=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.8,0.8),new THREE.MeshStandardMaterial({color:students[idx].color}));
            m.position.y=0.9; grp.add(m);
            resolve({mixer:null,actions:{}});
        });
    });
}

function spawnParticles(pos,color=0xff4400){

    for(let i=0;i<n;i++){p[i*3]=pos.x;p[i*3+1]=pos.y+1;p[i*3+2]=pos.z;vel.push(new THREE.Vector3((Math.random()-.5)*0.3,Math.random()*0.2+0.05,(Math.random()-.5)*0.3));}
    geo.setAttribute('position',new THREE.BufferAttribute(p,3));
    const pts=new THREE.Points(geo,new THREE.PointsMaterial({color,size:0.25,transparent:true,opacity:1}));
    scene.add(pts); let life=1;
    const tick=()=>{life-=0.04;if(life<=0){scene.remove(pts);return;}
        for(let i=0;i<n;i++){p[i*3]+=vel[i].x;p[i*3+1]+=vel[i].y;vel[i].y-=0.008;p[i*3+2]+=vel[i].z;}
        pts.material.opacity=life;geo.attributes.position.needsUpdate=true;requestAnimationFrame(tick);};
    tick();
}

let lastPos=new THREE.Vector3(9999,0,9999), lastRot=0, lastSeg=0, lastUp=0;
async function smartUpload(){
    if(!userId||!db) return;
    const now=Date.now(), pos=myGroup.position, rot=myGroup.rotation.y;
    const changed=pos.distanceTo(lastPos)>0.3||Math.abs(rot-lastRot)>0.05||myTail.length!==lastSeg;
    const force=(now-lastUp)>5000;
    if(!changed&&!force) return;
    lastPos.copy(pos);lastRot=rot;lastSeg=myTail.length;lastUp=now;
    try{
        await setDoc(doc(db,PATH.players(userId)),{
            x:pos.x,z:pos.z,rot,idx:myIdx,
            segCount:myTail.length,isMoving:keys.isMoving||joyActive,lastSeen:now

}

// ════════════════════════════════════════
//  Firebase 啟動
// ════════════════════════════════════════
async function initFirebase(){
    try{
        const app=initializeApp(FB);
        const auth=getAuth(app);
        db=getFirestore(app);
        setStatus('🔄 連線中...');
        await signInAnonymously(auth);

        onAuthStateChanged(auth,async user=>{
            if(!user) return;
            userId=user.uid;
            setStatus('✅ 已連線','WASD / 搖桿 移動');

            foodCol=collection(db,'artifacts',APP,'public','data','food');
            const playersCol=collection(db,'artifacts',APP,'public','data','players');

            // ── 監聽 Session（回合時間、主機）──────────────
            onSnapshot(doc(db,PATH.session), snap=>{
                if(!snap.exists()) return;
                const s=snap.data();
                // 同步回合結束時間
                if(s.roundEnd&&!isHost) roundEndTime=s.roundEnd;
                // 如果主機是自己，保持 roundEndTime
                if(isHost) return;
                // 若主機已死，嘗試接管
                if(s.hostId&&s.hostAlive&&Date.now()-s.hostAlive>8000){
                    isHost=false;
                    tryBecomeHost();
                }
            });

            // ── 監聽食物（只讀）────────────────────────────
            onSnapshot(foodCol, snap=>{
                const live=new Set(snap.docs.map(d=>d.id));
                Object.keys(foodMeshes).forEach(id=>{if(!live.has(id)) delFoodMesh(id);});
                snap.forEach(d=>addFoodMesh(d.id,d.data().x,d.data().z,d.data().t));
                setStatus('✅ 已連線',`WASD / 搖桿 移動　🍎 ${snap.size}`);
                // 食物不足時主機補充
                if(isHost&&snap.size<CONFIG.FOOD_MAX) fillFood();
            });

            // ── 監聽玩家（只讀）────────────────────────────
            onSnapshot(playersCol, snap=>{
                const liveIds=new Set(snap.docs.map(d=>d.id));
                snap.forEach(async dSnap=>{
                    const d=dSnap.data(), uid=dSnap.id;
                    if(uid===userId){
                        // 被偷同步
                        if(typeof d.segCount==='number'&&d.segCount<myTail.length){
                            const lost=myTail.length-d.segCount;
                            for(let i=0;i<lost;i++) removeTail();
                            showFlash(`💀 -${lost}`); updateScore();
                        }
                        return;
                    }
                    handleOther(uid,d);
                });
                Object.keys(others).forEach(uid=>{if(!liveIds.has(uid)) removeOther(uid);});
                updateCardUI(snap.docs.map(d=>d.data().idx));
            });

            // ── 智慧上傳：每 200ms 檢查 ────────────────────
            setInterval(smartUpload, 200);

            // ── 嘗試成為主機（進入時立刻嘗試）──────────────
            await tryBecomeHost();

            // ── 如果成為主機，設定初始回合時間 ─────────────
            if(isHost){
                roundEndTime=Date.now()+CONFIG.ROUND_DURATION*1000;
                await setDoc(doc(db,PATH.session),{roundEnd:roundEndTime},{merge:true});
            }

            // ── 主機心跳：每 3 秒 ───────────────────────────
            setInterval(()=>{
                if(isHost) hostHeartbeat();
                else tryBecomeHost(); // 非主機每 3 秒也檢查主機是否存活
            },3000);

            // ── 食物定期補充（只有主機執行）─────────────────
            setInterval(()=>{if(isHost) fillFood();},15000);

            // ── 離線清理（只有主機執行）─────────────────────
            setInterval(async()=>{
                if(!isHost||!db) return;
                const now=Date.now();
                const snap=await getDocs(playersCol).catch(()=>null);
                if(!snap) return;
                snap.forEach(async d=>{
                    if(d.data().lastSeen&&now-d.data().lastSeen>12000&&d.id!==userId){
                        await deleteDoc(d.ref).catch(()=>{});
                        console.log('[Cleanup]',d.id.slice(0,6));
                    }
                });
            },15000);

            // ── 離開時刪除自身資料 ──────────────────────────
            window.addEventListener('beforeunload',async()=>{
                if(db&&userId){
                    await deleteDoc(doc(db,PATH.players(userId))).catch(()=>{});
                    // 如果是主機，清除主機記錄讓別人可以接管
                    if(isHost) await setDoc(doc(db,PATH.session),{hostId:null,hostAlive:0},{merge:true}).catch(()=>{});
                }
            });
        });
    }catch(e){setStatus('⚠️ 連線失敗',e.message);}
}

async function handleOther(uid,d){
    if(!others[uid]){
        const g=new THREE.Group(); scene.add(g);
        others[uid]={g,segments:[],path:[],idx:-1,segCount:0};
    }
    const p=others[uid];
    p.targetPos=new THREE.Vector3(d.x,0,d.z);
    p.targetRot=d.rot; p.remoteMoving=d.isMoving; p.segCount=d.segCount??0;
    if(p.idx!==d.idx){
        p.idx=d.idx;
        const r=await loadModel(p.idx,p.g); p.mixer=r.mixer; p.actions=r.actions;
    }
    setSegCount(p.segments,p.segCount,students[d.idx??0]?.color??0xffffff);
}

function removeOther(uid){
    if(!others[uid]) return;
    scene.remove(others[uid].g);
    others[uid].segments.forEach(s=>scene.remove(s));
    delete others[uid];
}

// 觸控
const joyZone=document.getElementById('joystick-zone');
const joyBaseEl=document.getElementById('joystick-base');

document.addEventListener('touchstart',e=>{
    Array.from(e.changedTouches).forEach(t=>{
        const or=document.getElementById('overlay').getBoundingClientRect();
        if(t.clientY>=or.top) return;
        const jr=joyZone.getBoundingClientRect();
        const inJoy=t.clientX>=jr.left&&t.clientX<=jr.right&&t.clientY>=jr.top&&t.clientY<=jr.bottom;
        if(inJoy){if(touchIds.joy===-1){touchIds.joy=t.identifier;joyActive=true;}}
        else{if(touchIds.cam===-1){touchIds.cam=t.identifier;dragActive=true;dragLastX=t.clientX;dragLastY=t.clientY;}}
    });
},{passive:true});

document.addEventListener('touchmove',e=>{
    Array.from(e.changedTouches).forEach(t=>{
        if(t.identifier===touchIds.joy){
            const r=joyBaseEl.getBoundingClientRect();
            joyX=(t.clientX-r.left-r.width/2)/55;joyY=(t.clientY-r.top-r.height/2)/55;
            const d=Math.hypot(joyX,joyY);if(d>1){joyX/=d;joyY/=d;}
            knob.style.transform=`translate(${joyX*32}px,${joyY*32}px)`;
        }
        if(t.identifier===touchIds.cam&&dragActive){
            camAngle-=(t.clientX-dragLastX)*0.006;
            camPitch=Math.max(0.1,Math.min(1.2,camPitch+(t.clientY-dragLastY)*0.004));
            dragLastX=t.clientX;dragLastY=t.clientY;
        }
    });
},{passive:true});

document.addEventListener('touchend',e=>{
    Array.from(e.changedTouches).forEach(t=>{
        if(t.identifier===touchIds.joy){touchIds.joy=-1;joyActive=false;joyX=joyY=0;knob.style.transform='translate(0,0)';}
        if(t.identifier===touchIds.cam){touchIds.cam=-1;dragActive=false;}
    });
},{passive:true});

const clock=new THREE.Clock();
let foodBob=0;

function animate(){
    const dt=clock.getDelta();
    foodBob+=dt*2;
    updateTimer();
    tickWeather(dt);
    if(roundOver){renderer.render(scene,camera);return;}

    // ── VR 左手搖桿移動 ─────────────────────────────────
    if(renderer.xr.isPresenting){
        const gl=readVRPad(vrCtrlL), gr=readVRPad(vrCtrlR);
        if(gl){const vd=Math.hypot(gl.x,gl.y);if(vd>0.15){myGroup.position.x+=Math.sin(myGroup.rotation.y)*(-gl.y)*CONFIG.MOVE_SPEED*vd*1.5;myGroup.position.z+=Math.cos(myGroup.rotation.y)*(-gl.y)*CONFIG.MOVE_SPEED*vd*1.5;}}
        if(gr&&Math.abs(gr.x)>0.2) myGroup.rotation.y-=gr.x*0.04;
    }

    // 移動（鍵盤）
    let spd=0;
    if(keys['w']||keys['arrowup'])    spd= CONFIG.MOVE_SPEED;
    if(keys['s']||keys['arrowdown'])  spd=-CONFIG.MOVE_SPEED;
    if(keys['a']||keys['arrowleft'])  myGroup.rotation.y+=CONFIG.TURN_SPEED;
    if(keys['d']||keys['arrowright']) myGroup.rotation.y-=CONFIG.TURN_SPEED;
    if(spd!==0){
        myGroup.position.x+=Math.sin(myGroup.rotation.y)*spd;
        myGroup.position.z+=Math.cos(myGroup.rotation.y)*spd;
    }

    // 移動（搖桿）
    let joyMoved=false;
    if(joyActive){
        const d=Math.hypot(joyX,joyY);
        if(d>0.1){
            const wa=Math.atan2(joyX,-joyY)+camAngle+Math.PI;
            myGroup.rotation.y=wa;
            const js=CONFIG.MOVE_SPEED*d;
            myGroup.position.x+=Math.sin(wa)*js;
            myGroup.position.z+=Math.cos(wa)*js;
            spd=js; joyMoved=true;
        }
    }

    const moving=spd!==0||joyMoved;
    keys.isMoving=moving;
    if(myMixer){myMixer.update(dt);safeAnim(myActions,moving);}

    // 路徑 & 尾巴
    myPath.unshift({pos:myGroup.position.clone()});
    if(myPath.length>500) myPath.pop();
    myTail.forEach((s,i)=>{
        const st=(i+1)*CONFIG.SEG_SPACING;
        if(myPath[st]){
            s.mesh.position.lerp(myPath[st].pos,0.4);
            s.mesh.position.y=0.5+Math.sin(foodBob+i*0.8)*0.12;
            s.mesh.rotation.y+=dt*0.8;
        }
    });

    // 吃食物
    const hp=myGroup.position;
    Object.entries(foodMeshes).forEach(([id,grp])=>{
        grp.position.y=0.5+Math.sin(foodBob+id.charCodeAt(0)*0.5)*0.22;
        grp.rotation.y+=dt*1.2;
        if(hp.distanceTo(grp.position)<CONFIG.FOOD_EAT_DIST){
            const t=grp.userData.t??0;
            delFoodMesh(id);
            addTail(t);
            updateScore();
            showFlash('🍎 +1');
            spawnParticles(grp.position.clone(),FOOD_COLORS[t%FOOD_COLORS.length]);
            if(db) deleteDoc(doc(db,'artifacts',APP,'public','data','food',id)).catch(()=>{});
        }
    });

    // 子彈
    for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i]; b.life-=dt;
        b.mesh.position.addScaledVector(b.dir,CONFIG.BULLET_SPEED);
        b.mesh.rotation.y+=dt*4;
        let hit=false;
        for(const [uid,p] of Object.entries(others)){
            if(b.mesh.position.distanceTo(p.g.position)<CONFIG.BULLET_HIT_DIST){
                spawnParticles(b.mesh.position.clone(),0xff4400);
                scene.remove(b.mesh); bullets.splice(i,1); hit=true;
                if(db) setDoc(doc(db,PATH.players(uid)),{segCount:Math.max(0,(p.segCount??1)-2)},{merge:true}).catch(()=>{});
                showFlash('💥 命中！'); break;
            }
        }
        if(!hit&&b.life<=0){scene.remove(b.mesh);bullets.splice(i,1);}
    }

    // 碰撞奪取
    for(const [uid,p] of Object.entries(others))
        for(const seg of p.segments)
            if(hp.distanceTo(seg.position)<CONFIG.STEAL_DIST){trySteal(uid);break;}

    // 遠端玩家
    for(const [,p] of Object.entries(others)){
        if(p.targetPos) p.g.position.lerp(p.targetPos,0.15);
        if(p.targetRot!==undefined) p.g.rotation.y=THREE.MathUtils.lerp(p.g.rotation.y,p.targetRot,0.15);
        if(p.mixer){p.mixer.update(dt);safeAnim(p.actions,p.remoteMoving);}
        p.path=p.path||[];
        p.path.unshift({pos:p.g.position.clone()});
        if(p.path.length>500) p.path.pop();
        p.segments.forEach((s,i)=>{const st=(i+1)*CONFIG.SEG_SPACING;if(p.path[st]) s.position.lerp(p.path[st].pos,0.4);});
    }

    // 攝影機
    if(renderer.xr.isPresenting){
        vrRig.position.set(myGroup.position.x,1.6,myGroup.position.z);
        vrRig.rotation.y=myGroup.rotation.y;
    } else {
        vrRig.position.set(0,0,0); vrRig.rotation.y=0;
        const cx=myGroup.position.x+Math.sin(camAngle)*CAM_DIST*Math.cos(camPitch);
        const cy=myGroup.position.y+Math.sin(camPitch)*CAM_DIST+CAM_H*0.3;
        const cz=myGroup.position.z+Math.cos(camAngle)*CAM_DIST*Math.cos(camPitch);
        camera.position.lerp(new THREE.Vector3(cx,cy,cz),0.1);
        camera.lookAt(myGroup.position.x,1.5,myGroup.position.z);
    }
    renderer.render(scene,camera);
}

function initUI(){
    const grid=document.getElementById('selection-grid');
    students.forEach((s,i)=>{
        const c=document.createElement('div');
        c.className='character-card'; c.id=`card-${i}`;
        const hex=new THREE.Color(s.color).getHexString();
        c.innerHTML=`<div class="character-icon" style="background-color:#${hex};background-image:url('icon_${i}.jpg')"></div><div class="character-name">${s.name}</div>`;
        if(i===21){
            c.onclick=()=>location.href='gallery.html';
            c.style.cssText+='border-color:#ff88ff;background:rgba(255,136,255,0.15);';
            c.title='🖼️ 虛擬藝廊';
        } else {
            c.onclick=()=>switchChar(i);
        }
        grid.appendChild(c);
    });

    // icon_21: 藝廊連結卡片（手動追加）
    const galleryCard = document.createElement('div');
    galleryCard.className='character-card';
    galleryCard.style.cssText='border-color:#ff88ff;background:rgba(255,136,255,0.1);';
    galleryCard.innerHTML=`<div class="character-icon" style="background-color:#884488;background-image:url('icon_21.jpg')"></div><div class="character-name">🖼️ 虛擬展場</div>`;
    galleryCard.onclick=()=>location.href='gallery.html';
    galleryCard.title='虛擬展場';
    grid.appendChild(galleryCard);

    // icon_22: 貪美食（重新整理遊戲）
    const gameCard = document.createElement('div');
    gameCard.className='character-card';
    gameCard.style.cssText='border-color:#00f2ff;background:rgba(0,242,255,0.1);';
    gameCard.innerHTML=`<div class="character-icon" style="background-color:#0a2a4a;background-image:url('icon_22.jpg')"></div><div class="character-name">🍎 貪美食</div>`;
    gameCard.onclick=()=>location.reload();
    gameCard.title='貪美食';
    grid.appendChild(gameCard);
}
function updateCardUI(idxs){
    document.querySelectorAll('.character-card').forEach((c,i)=>{
        c.classList.toggle('online',idxs.includes(i)&&i!==myIdx);
        c.classList.toggle('active',i===myIdx);
    });
}
async function switchChar(idx){
    myIdx=idx;
    document.querySelectorAll('.character-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
    const r=await loadModel(idx,myGroup); myMixer=r.mixer; myActions=r.actions;
}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// ════════════════════════════════════════
//  啟動
// ════════════════════════════════════════
initUI();
switchChar(0);
await preloadFoodGLBs();
initFirebase();

// VR 按鈕
const vrBtn=VRButton.createButton(renderer);
vrBtn.style.cssText+='position:fixed;bottom:85px;left:50%;transform:translateX(-50%);z-index:200;font-size:12px;';
document.body.appendChild(vrBtn);

renderer.setAnimationLoop(animate); // 支援 VR requestAnimationFrame
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🖼️ 虛擬藝廊</title>
    <style>
        *{box-sizing:border-box;}
        body{margin:0;overflow:hidden;background:#060614;font-family:"Microsoft JhengHei",sans-serif;touch-action:none;}
        #c{position:fixed;top:0;left:0;width:100%;height:100%;}
        #title{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#fff;font-size:15px;font-weight:bold;letter-spacing:2px;background:rgba(20,20,60,0.75);padding:5px 22px;border-radius:20px;border:1px solid rgba(150,150,255,0.4);pointer-events:none;z-index:100;text-shadow:0 0 12px rgba(150,150,255,0.8);}
        #hint{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:10px;pointer-events:none;z-index:100;white-space:nowrap;}
        #back-btn{position:fixed;top:14px;left:16px;background:rgba(30,30,80,0.85);border:1px solid rgba(100,100,255,0.5);color:#aac;padding:5px 14px;border-radius:16px;cursor:pointer;font-size:12px;z-index:200;}
        #back-btn:hover{background:rgba(60,60,140,0.9);}
        #joy-zone{position:fixed;bottom:82px;left:20px;width:110px;height:110px;z-index:300;display:none;}
        #joy-base{width:100%;height:100%;background:rgba(255,255,255,0.1);border-radius:50%;border:2px solid rgba(150,150,255,0.5);position:relative;}
        #joy-knob{position:absolute;top:32px;left:32px;width:46px;height:46px;background:rgba(120,120,255,0.7);border-radius:50%;box-shadow:0 0 14px rgba(120,120,255,0.6);}
        #clear-mob{position:fixed;bottom:90px;right:20px;width:68px;height:68px;border-radius:50%;background:rgba(80,80,200,0.85);border:3px solid #8888ff;color:#fff;font-size:24px;display:none;align-items:center;justify-content:center;z-index:300;user-select:none;touch-action:none;}
        #brush-bar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(10,10,40,0.88);padding:7px 14px;border-radius:30px;border:1px solid rgba(120,120,255,0.3);z-index:200;backdrop-filter:blur(8px);}
        .bc{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform 0.15s;}
        .bc.on{border:3px solid #fff;transform:scale(1.3);}
        #sz{width:55px;accent-color:#8888ff;}
        .bb{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:4px 12px;border-radius:12px;cursor:pointer;font-size:11px;white-space:nowrap;}
        .bb.on{background:rgba(255,80,80,0.4);border-color:#ff6666;}
        @media(pointer:coarse){#joy-zone{display:block;}#clear-mob{display:flex;}#hint{display:none;}}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">🖼️ 虛擬藝廊</div>
<button id="back-btn" onclick="location.href='index.html'">← 遊戲</button>
<div id="hint">WASD 移動 ｜ 拖曳 轉視角 ｜ 按住左鍵 畫畫</div>
<div id="brush-bar">
    <span style="color:#888;font-size:11px;">🖌️</span>
    <div class="bc on" style="background:#ff4444" data-c="#ff4444"></div>
    <div class="bc" style="background:#ff8844" data-c="#ff8844"></div>
    <div class="bc" style="background:#ffee44" data-c="#ffee44"></div>
    <div class="bc" style="background:#44ee88" data-c="#44ee88"></div>
    <div class="bc" style="background:#44aaff" data-c="#44aaff"></div>
    <div class="bc" style="background:#cc44ff" data-c="#cc44ff"></div>
    <div class="bc" style="background:#ffffff" data-c="#ffffff"></div>
    <div class="bc" style="background:#ff88cc" data-c="#ff88cc"></div>
    <input id="sz" type="range" min="1" max="8" step="1" value="2">
    <button class="bb" id="draw-btn">✏️ 畫</button>
    <button class="bb" id="clear-btn">🗑️</button>
</div>
<div id="joy-zone"><div id="joy-base"><div id="joy-knob"></div></div></div>
<div id="clear-mob">🗑️</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRButton }   from 'three/addons/webxr/VRButton.js';

const STUDENTS=[
    {name:"高安妤",color:0xff4444},{name:"饒允志",color:0x44ccff},
    {name:"朱采曼",color:0x8844ff},{name:"林宸慈",color:0x44ff88},
    {name:"駱采綺",color:0xffdd44},{name:"莊芷媛",color:0xff44aa},
    {name:"蘇汶欣",color:0xaa44ff},{name:"葉子菱",color:0xff8844},
    {name:"張羽涵",color:0xffffff},{name:"高子媛",color:0xffeeaa},
    {name:"金煜喬",color:0xccaa66},{name:"陳品霖",color:0x999999},
    {name:"許博勛",color:0xffaa00},{name:"陳湘妮",color:0xffccee},
    {name:"劉奕汝",color:0xffbbbb},{name:"蔡明樺",color:0xbbbbff},
    {name:"鍾凱羽",color:0xbbffcc},{name:"葉子菱",color:0x88ccff},
    {name:"林子婷",color:0xffaacc},{name:"楊貽婷",color:0xcc88ff},
    {name:"金羽姍",color:0xffdd44},
];
const RADIUS=28;

const canvas=document.getElementById('c');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,300);
const renderer=new THREE.WebGLRenderer({canvas,antialias:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
const vrRig=new THREE.Group(); vrRig.add(camera); scene.add(vrRig);

// 場景
scene.background=new THREE.Color(0x060614);
scene.fog=new THREE.Fog(0x060614,45,110);
new THREE.TextureLoader().load('sky2.jpg',t=>{
    t.mapping=THREE.EquirectangularReflectionMapping;
    scene.background=t; scene.fog=null;
});

// 燈光
scene.add(new THREE.AmbientLight(0xaabbdd,1.2));
const ml=new THREE.DirectionalLight(0xeeeeff,2.5); ml.position.set(0,50,0); scene.add(ml);
scene.add(new THREE.HemisphereLight(0x5566aa,0x222244,1.0));
[-1,1].forEach(s=>{const sp=new THREE.SpotLight(0xaaccff,3,70,Math.PI/5,0.4);sp.position.set(s*18,20,0);scene.add(sp);});

// 地板
const fM=new THREE.MeshStandardMaterial({color:0xf0f0ff,metalness:0.75,roughness:0.04});
const fl=new THREE.Mesh(new THREE.PlaneGeometry(200,200),fM); fl.rotation.x=-Math.PI/2; scene.add(fl);
const gr=new THREE.GridHelper(200,80,0xccccee,0xddddff); gr.material.transparent=true; gr.material.opacity=0.12; gr.position.y=0.01; scene.add(gr);

// 邊界柱
const pM=new THREE.MeshStandardMaterial({color:0xccccff,emissive:0x8888ff,emissiveIntensity:0.45,metalness:0.8,roughness:0.1});
for(let i=0;i<20;i++){
    const a=i/20*Math.PI*2,d=38,h=2.2+Math.sin(i*0.8)*1.0;
    const p=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.2,h,8),pM);
    p.position.set(Math.cos(a)*d,h/2,Math.sin(a)*d); scene.add(p);
    const gl=new THREE.PointLight(0x8888ff,0.7,8); gl.position.set(Math.cos(a)*d,h+0.5,Math.sin(a)*d); scene.add(gl);
}
const cM=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xaaaaff,emissiveIntensity:0.7,metalness:0.9,roughness:0.04});
const cd=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.7,0.1,16),cM); cd.position.y=0.05; scene.add(cd);
const clt=new THREE.PointLight(0xaaaaff,2.5,28); clt.position.set(0,1.5,0); scene.add(clt);

// 椅子
(function(){
    const bM2=new THREE.MeshStandardMaterial({color:0x334466,metalness:0.5,roughness:0.3});
    const lM2=new THREE.MeshStandardMaterial({color:0x7788aa,metalness:0.6,roughness:0.2});
    [{x:0,z:7},{x:0,z:-7},{x:7,z:0},{x:-7,z:0},{x:13,z:13},{x:-13,z:13},{x:13,z:-13},{x:-13,z:-13}].forEach(function(pos){
        var g=new THREE.Group();
        var seat=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.18,0.65),bM2); seat.position.y=0.48; g.add(seat);
        var back=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.55,0.1),bM2); back.position.set(0,0.88,0.27); g.add(back);
        [[-1,0.15,-0.25],[1,0.15,-0.25],[-1,0.15,0.25],[1,0.15,0.25]].forEach(function(lp){
            var leg=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.38,0.08),lM2); leg.position.set(lp[0],lp[1],lp[2]); g.add(leg);
        });
        g.position.set(pos.x,0,pos.z); g.rotation.y=Math.atan2(pos.x,pos.z)+Math.PI/2; scene.add(g);
    });
}());

// 圖片載入（callback 方式，不用 await）
const texL=new THREE.TextureLoader();
function tryLoadTex(base,mat){
    var urls=[base+'.png',base+'.jpg'];
    var idx=0;
    function next(){
        if(idx>=urls.length) return;
        var url=urls[idx++];
        fetch(url,{method:'HEAD'}).then(function(r){
            if(r.ok){ texL.load(url,function(t){mat.map=t;mat.color.set(0xffffff);mat.needsUpdate=true;}); }
            else next();
        }).catch(function(){next();});
    }
    next();
}

// 海報 + 角色
const loader=new GLTFLoader();
var charGroups=[]; // 所有角色 group（緩慢自轉用）

STUDENTS.forEach(function(art,i){
    var angle=(i/STUDENTS.length)*Math.PI*2;
    var px=Math.cos(angle)*RADIUS, pz=Math.sin(angle)*RADIUS;

    var frame=new THREE.Mesh(new THREE.BoxGeometry(4.2,5.2,0.14),new THREE.MeshLambertMaterial({color:0xddbb77}));
    var cardMat=new THREE.MeshBasicMaterial({color:new THREE.Color(art.color)});
    var card=new THREE.Mesh(new THREE.PlaneGeometry(3.8,4.8),cardMat); card.position.z=0.08;
    if(i<=18) tryLoadTex('gallery_'+i,cardMat);

    var nc=document.createElement('canvas'); nc.width=512; nc.height=88;
    var ctx=nc.getContext('2d');
    ctx.fillStyle='rgba(10,10,40,0.75)'; ctx.fillRect(0,0,512,88);
    ctx.fillStyle='#eeeeff'; ctx.font='bold 40px Microsoft JhengHei,sans-serif';
    ctx.textAlign='center'; ctx.fillText((i+1)+'. '+art.name,256,56);
    var label=new THREE.Mesh(new THREE.PlaneGeometry(3.8,0.55),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(nc),transparent:true}));
    label.position.set(0,-2.65,0.09);

    var pg=new THREE.Group(); pg.add(frame,card,label);
    pg.position.set(px,3.2,pz); pg.lookAt(0,3.2,0); scene.add(pg);

    // 角色站在海報正前方，面向外側（朝觀眾）
    // 角色站海報正前方：緩慢自轉展示，統一等高 ─────────
    var charDist = RADIUS - 2.6;
    var cx = Math.cos(angle) * charDist;
    var cz = Math.sin(angle) * charDist;
    var cg = new THREE.Group();
    cg.position.set(cx, 0, cz);
    scene.add(cg);
    charGroups.push(cg); // 記錄所有角色 group，動畫裡旋轉

    loader.load('student_'+i+'.glb', function(gltf){
        var m = gltf.scene;
        m.scale.setScalar(1);

        // 兩步驟統一高度：
        // 1. 先算出原始 BBox 高度
        m.updateMatrixWorld(true);
        var box1 = new THREE.Box3().setFromObject(m);
        var rawH = box1.max.y - box1.min.y;

        // 2. 縮放到目標高度 1.9m（不管原始多大）
        var TARGET = 1.9;
        if(rawH > 0.01) m.scale.setScalar(TARGET / rawH);

        // 3. 重算縮放後 BBox，讓腳踩地
        m.updateMatrixWorld(true);
        var box2 = new THREE.Box3().setFromObject(m);
        m.position.y = -box2.min.y;

        // 初始朝向：讓正面面外（角度 = angle，對應圓外方向）
        cg.rotation.y = angle + Math.PI;
        cg.add(m);
    }, undefined, function(){
        var body = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,1.1,8),new THREE.MeshLambertMaterial({color:art.color}));
        body.position.y = 0.7; cg.add(body);
        var head = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshLambertMaterial({color:art.color}));
        head.position.y = 1.65; cg.add(head);
        cg.rotation.y = angle + Math.PI;
    });
    // 地面光圈
    var rc=new THREE.EllipseCurve(0,0,1.1,1.1,0,Math.PI*2);
    var ring=new THREE.Mesh(new THREE.ShapeGeometry(new THREE.Shape(rc.getPoints(14))),
        new THREE.MeshBasicMaterial({color:new THREE.Color(art.color),transparent:true,opacity:0.25,side:THREE.DoubleSide}));
    ring.rotation.x=-Math.PI/2;
    ring.position.set(cx, 0.05, cz);
    scene.add(ring);
});

// 移動
var fpPos=new THREE.Vector3(0,1.6,8);
var fpYaw=0;
var fpDrag=false, fpDragX=0;
var keys={};
var joyActive=false, joyX=0, joyY=0;
var touchIds={joy:-1,cam:-1};
var drawings=[]; // 舊引用，現用 allStrokes
// ── 畫筆系統（THREE.Line，簡單可靠）────────────────────
var isDrawing=false, mouseHeld=false;
var brushColor=new THREE.Color('#ff4444');
var brushLineWidth=2;       // 線條寬度（px，僅電腦有效）
var allStrokes=[];          // 所有筆觸
var curPoints=[];           // 當前筆觸的點
var curLine=null;           // 當前筆觸的 Line 物件
var lastPos=null;           // 上次位置（避免重複點）

// ═══════════════════════════════════════════════════════
//  畫筆系統：Raycaster 投影（滑鼠/觸控直接對應3D位置）
// ═══════════════════════════════════════════════════════
var isDrawing=false, mouseHeld=false;
var brushColor=new THREE.Color('#ff4444');
var brushLineWidth=3;
var allStrokes=[], curPoints=[], curLine=null, lastPos=null;

// 追蹤最新的滑鼠/觸控座標
var _lastClientX=innerWidth/2, _lastClientY=innerHeight/2;
var _raycaster=new THREE.Raycaster();

// 核心：把螢幕座標 → 3D 空間（投影到相機前方平面）
function screenTo3D(clientX, clientY){
    var rect=cvs.getBoundingClientRect();
    var nx=((clientX-rect.left)/rect.width)*2-1;
    var ny=-((clientY-rect.top)/rect.height)*2+1;
    _raycaster.setFromCamera(new THREE.Vector2(nx,ny), camera);

    // 建立距相機前方 4m 的平面（法向量朝相機）
    var camDir=new THREE.Vector3(); camera.getWorldDirection(camDir);
    var camPos=new THREE.Vector3(); camera.getWorldPosition(camPos);
    var planeOrigin=camPos.clone().addScaledVector(camDir,4.0);
    var plane=new THREE.Plane().setFromNormalAndCoplanarPoint(
        camDir.clone().negate(), planeOrigin
    );
    var hit=new THREE.Vector3();
    var ok=_raycaster.ray.intersectPlane(plane,hit);
    return ok ? hit : null;
}

// VR 模式：從相機視線前方取點
function getVRBrushPos(){
    var wp=new THREE.Vector3(); camera.getWorldPosition(wp);
    var wd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    return wp.clone().addScaledVector(wd,0.8);
}

function strokeBegin(clientX, clientY){
    if(curLine) strokeFinish();
    curPoints=[]; lastPos=null;
}

function strokeDrawAt(clientX, clientY){
    var pos=renderer.xr.isPresenting
        ? getVRBrushPos()
        : screenTo3D(clientX, clientY);
    if(!pos) return;
    if(lastPos&&pos.distanceTo(lastPos)<0.015) return;
    lastPos=pos.clone();
    curPoints.push(pos.clone());

    if(curPoints.length<2) return;
    if(curLine){ curLine.geometry.dispose(); scene.remove(curLine); }
    var geo=new THREE.BufferGeometry().setFromPoints(curPoints);
    var mat=new THREE.LineBasicMaterial({color:brushColor.clone(),linewidth:brushLineWidth});
    curLine=new THREE.Line(geo,mat);
    scene.add(curLine);
}

// VR 用（不需要螢幕座標）
function strokeDraw(){ strokeDrawAt(_lastClientX,_lastClientY); }

function strokeFinish(){
    if(curLine&&curPoints.length>=2){
        allStrokes.push(curLine);
    } else {
        if(curLine){ scene.remove(curLine); curLine.geometry.dispose(); }
        if(curPoints.length===1){
            var pt=new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),
                new THREE.MeshBasicMaterial({color:brushColor.clone()}));
            pt.position.copy(curPoints[0]); scene.add(pt); allStrokes.push(pt);
        }
    }
    curLine=null; curPoints=[]; lastPos=null;
    while(allStrokes.length>400){
        var old=allStrokes.shift(); scene.remove(old);
        if(old.geometry) old.geometry.dispose();
    }
}

function clearAll(){
    if(curLine){scene.remove(curLine);curLine.geometry.dispose();curLine=null;}
    allStrokes.forEach(function(s){scene.remove(s);if(s.geometry)s.geometry.dispose();});
    allStrokes.length=0; curPoints=[]; lastPos=null;
}


document.querySelectorAll('.bc').forEach(function(el){
    el.addEventListener('click',function(){
        document.querySelectorAll('.bc').forEach(function(e){e.classList.remove('on');});
        el.classList.add('on'); brushColor.set(el.dataset.c);
    });
});
document.getElementById('sz').addEventListener('input',function(e){brushLineWidth=parseInt(e.target.value);});
document.getElementById('draw-btn').addEventListener('click',function(){
    isDrawing=!isDrawing;
    document.getElementById('draw-btn').classList.toggle('on',isDrawing);
    document.getElementById('draw-btn').textContent=isDrawing?'🛑 停':'✏️ 畫';
});
document.getElementById('clear-btn').addEventListener('click',clearAll);
document.getElementById('clear-mob').addEventListener('touchstart',function(e){e.preventDefault();clearAll();},{passive:false});

var cvs=renderer.domElement;
cvs.style.touchAction='none'; // 防止手機預設手勢干擾
cvs.addEventListener('pointerdown',function(e){
    if(e.button!==0&&e.pointerType==='mouse') return;
    cvs.setPointerCapture(e.pointerId);
    _lastClientX=e.clientX; _lastClientY=e.clientY;
    mouseHeld=true; fpDrag=false;
    if(isDrawing){ strokeBegin(e.clientX,e.clientY); strokeDrawAt(e.clientX,e.clientY); }
    else { fpDrag=true; fpDragX=e.clientX; }
});
cvs.addEventListener('pointermove',function(e){
    _lastClientX=e.clientX; _lastClientY=e.clientY;
    if(!mouseHeld) return;
    if(isDrawing){ strokeDrawAt(e.clientX,e.clientY); }
    else if(fpDrag){ fpYaw-=(e.clientX-fpDragX)*0.004; fpDragX=e.clientX; }
});
cvs.addEventListener('pointerup',function(e){
    cvs.releasePointerCapture(e.pointerId);
    if(isDrawing) strokeFinish();
    mouseHeld=false; fpDrag=false;
});
cvs.addEventListener('pointercancel',function(e){
    if(isDrawing) strokeFinish();
    mouseHeld=false; fpDrag=false;
});

var jBase=document.getElementById('joy-base');
var jKnob=document.getElementById('joy-knob');
var jZone=document.getElementById('joy-zone');
document.addEventListener('touchstart',function(e){
    Array.from(e.changedTouches).forEach(function(t){
        var br=document.getElementById('brush-bar').getBoundingClientRect();
        if(t.clientY>=br.top) return;
        var jr=jZone.getBoundingClientRect();
        var inJ=t.clientX>=jr.left&&t.clientX<=jr.right&&t.clientY>=jr.top&&t.clientY<=jr.bottom;
        if(inJ){
            if(touchIds.joy===-1){touchIds.joy=t.identifier;joyActive=true;}
        } else {
            if(touchIds.cam===-1){
                touchIds.cam=t.identifier;
                mouseHeld=true;
                if(isDrawing){
                    strokeBegin(t.clientX,t.clientY);
                    strokeDrawAt(t.clientX,t.clientY);
                } else {
                    fpDrag=true; fpDragX=t.clientX;
                }
            }
        }
    });
},{passive:true});
document.addEventListener('touchmove',function(e){
    Array.from(e.changedTouches).forEach(function(t){
        if(t.identifier===touchIds.joy){
            var r=jBase.getBoundingClientRect();
            joyX=(t.clientX-r.left-r.width/2)/55; joyY=(t.clientY-r.top-r.height/2)/55;
            var d=Math.hypot(joyX,joyY); if(d>1){joyX/=d;joyY/=d;}
            jKnob.style.transform='translate('+joyX*32+'px,'+joyY*32+'px)';
        }
        if(t.identifier===touchIds.cam){
            if(isDrawing && mouseHeld){
                strokeDrawAt(t.clientX,t.clientY);
            } else if(fpDrag && !isDrawing){
                fpYaw-=(t.clientX-fpDragX)*0.006;
                fpDragX=t.clientX;
            }
        }
    });
},{passive:true});
document.addEventListener('touchend',function(e){
    Array.from(e.changedTouches).forEach(function(t){
        if(t.identifier===touchIds.joy){touchIds.joy=-1;joyActive=false;joyX=joyY=0;jKnob.style.transform='translate(0,0)';}
        if(t.identifier===touchIds.cam){if(isDrawing)strokeFinish();touchIds.cam=-1;fpDrag=false;mouseHeld=false;}
    });
},{passive:true});
addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
addEventListener('resize',function(){
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

var SPEED=0.15;

// ── VR 輸入（使用 getSession().inputSources，最相容）──────
var vrDrawing=false;

function getVRInput(){
    var session=renderer.xr.getSession();
    if(!session) return null;
    var moveX=0,moveZ=0,rotY=0,trigR=false,trigL=false;
    for(var src of session.inputSources){
        if(!src.gamepad) continue;
        var ax=src.gamepad.axes, bt=src.gamepad.buttons;
        if(src.handedness==='left'){
            moveX=ax[2]||0; moveZ=ax[3]||0;
            if(bt&&bt[0]&&bt[0].pressed) trigL=true;
        } else if(src.handedness==='right'){
            rotY=ax[2]||0;
            if(bt&&bt[0]&&bt[0].pressed) trigR=true;
        }
    }
    return {moveX,moveZ,rotY,trigR,trigL};
}

function animate(){
    // 角色緩慢自轉（每秒約 30°）
    var rotDelta = 0.006;
    for(var cg2 of charGroups){ cg2.rotation.y += rotDelta; }
    var fwdX=Math.sin(fpYaw), fwdZ=Math.cos(fpYaw);

    var vrIn=getVRInput();
    if(renderer.xr.isPresenting&&vrIn){
        // 右手搖桿轉向
        fpYaw-=vrIn.rotY*0.04;
        // 左手搖桿移動（前後＋左右平移）
        var vd=Math.hypot(vrIn.moveX,vrIn.moveZ);
        if(vd>0.12){
            fpPos.x-=fwdX*vrIn.moveZ*SPEED*1.5;
            fpPos.z-=fwdZ*vrIn.moveZ*SPEED*1.5;
            fpPos.x+=Math.cos(fpYaw)*vrIn.moveX*SPEED*1.5;
            fpPos.z-=Math.sin(fpYaw)*vrIn.moveX*SPEED*1.5;
        }
        // 右手扳機：畫點
        // VR 右手扳機：按住畫線（視線前方）
        if(vrIn.trigR){
            if(!mouseHeld){ mouseHeld=true; strokeBegin(0,0); }
            strokeDraw(); // VR 用 getVRBrushPos()
        } else {
            if(mouseHeld){ strokeFinish(); mouseHeld=false; }
        }
        // 左手扳機：清除
        if(vrIn.trigL) clearAll();
    } else if(!renderer.xr.isPresenting){
        // ── 鍵盤 WASD ────────────────────────────────────
        if(keys['w']||keys['arrowup'])   {fpPos.x-=fwdX*SPEED;fpPos.z-=fwdZ*SPEED;}
        if(keys['s']||keys['arrowdown']) {fpPos.x+=fwdX*SPEED;fpPos.z+=fwdZ*SPEED;}
        if(keys['a']||keys['arrowleft']) fpYaw+=0.04;
        if(keys['d']||keys['arrowright'])fpYaw-=0.04;
        // ── 手機搖桿 ─────────────────────────────────────
        if(joyActive){
            var d=Math.hypot(joyX,joyY);
            if(d>0.1){
                fpPos.x-=fwdX*SPEED*(-joyY)*Math.min(d,1);
                fpPos.z-=fwdZ*SPEED*(-joyY)*Math.min(d,1);
                fpYaw  -=joyX*0.055*Math.min(d,1);
            }
        }
    }

    fpPos.x=Math.max(-55,Math.min(55,fpPos.x));
    fpPos.z=Math.max(-55,Math.min(55,fpPos.z));

    if(renderer.xr.isPresenting){
        vrRig.position.set(fpPos.x, 0, fpPos.z);
        vrRig.rotation.y = fpYaw;
    } else {
        vrRig.position.set(0,0,0);
        camera.position.copy(fpPos);
        camera.rotation.set(0,fpYaw,0);
    }
    renderer.render(scene,camera);
}

var vrBtn=VRButton.createButton(renderer);
vrBtn.style.cssText+='bottom:140px !important;font-size:12px !important;';
document.body.appendChild(vrBtn);

renderer.setAnimationLoop(animate);
</script>
